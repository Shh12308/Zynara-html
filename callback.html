<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auth Callback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body>
  <h3>Signing you in...</h3>
<script src="env.js"></script>
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    // ⚠️ HARD REQUIRE: ensure these are correct
    const SUPABASE_URL = window.__ENV__?.SUPABASE_URL;
    const SUPABASE_ANON_KEY = window.__ENV__?.SUPABASE_ANON_KEY;

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
      document.body.innerHTML = "Missing Supabase config (env.js issue)";
      throw new Error("Missing env");
    }

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleAuth() {
      try {
        console.log("Callback URL:", window.location.href);

        // 🔥 IMPORTANT: this is correct PKCE exchange
        const { data, error } = await supabase.auth.exchangeCodeForSession(
          window.location.href
        );

        if (error) {
          console.error("Auth error:", error.message);
          document.body.innerHTML = "Login failed: " + error.message;
          return;
        }

        if (!data?.session) {
          document.body.innerHTML = "No session returned";
          return;
        }

        console.log("User:", data.session.user.email);

        // 🧹 Clean URL (remove ?code=...)
        window.history.replaceState({}, document.title, "/");

        // ✅ Redirect to dashboard
        window.location.href = "/index.html";

      } catch (err) {
        console.error("Unexpected error:", err);
        document.body.innerHTML = "Unexpected error during login";
      }
    }

    handleAuth();
  </script>
</body>
</html>
