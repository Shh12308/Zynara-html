<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Logging in…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
</head>
<body>
  <div style="text-align:center; margin-top:50px;">
    <h1>Logging you in…</h1>
    <p>Please wait while we complete your login.</p>
  </div>

  <!-- Load environment variables -->
  <script src="env.js"></script>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  if (!window.__ENV__) {
    alert("Configuration error. Please refresh.");
    throw new Error("env.js not loaded");
  }

  const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.__ENV__;
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function handleAuthCallback() {
    try {
      // 🔐 Exchange tokens in URL for a session
      const { data, error } = await supabase.auth.getSessionFromUrl({
        storeSession: true
      });

      if (error) {
        console.error("Auth callback error:", error);
        window.location.replace("login.html");
        return;
      }

      if (!data?.session) {
        throw new Error("No session returned");
      }

      // 🔍 Detect flow type
      const params = new URLSearchParams(window.location.search);
      const type = params.get("type");

      // 🧹 Clean URL (remove tokens)
      window.history.replaceState({}, document.title, "/");

      // 🔀 Route based on flow
      switch (type) {
        case "recovery":
          // Password reset
          window.location.replace("/reset-password.html");
          break;

        case "signup":
          // Email confirmation
          window.location.replace("/email-confirmed.html");
          break;

        case "magiclink":
        case "oauth":
        default:
          // Normal login
          window.location.replace("/index.html");
          break;
      }

    } catch (err) {
      console.error("Authentication processing failed:", err);
      window.location.replace("login.html");
    }
  }

  handleAuthCallback();
</script>
</body>
</html>
