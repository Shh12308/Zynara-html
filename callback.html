<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auth Callback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body>
  <h3>Signing you in...</h3>
<script src="env.js"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const retryBtn = document.getElementById('retry');

    /* =========================
       ENV VALIDATION
       ========================= */
    if (!window.__ENV__) {
      statusEl.textContent = "Configuration error";
      errorEl.textContent = "env.js failed to load.";
      throw new Error("env.js not loaded");
    }

    const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.__ENV__;

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
      statusEl.textContent = "Configuration error";
      errorEl.textContent = "Missing Supabase credentials.";
      throw new Error("Missing Supabase config");
    }

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* =========================
       CALLBACK HANDLER
       ========================= */
    async function handleAuth() {
      try {
        statusEl.textContent = "Finalizing secure login...";

        // Exchange OAuth code for session
        const { error } = await supabase.auth.exchangeCodeForSession(window.location.href);

        if (error) throw error;

        // Validate session exists
        const { data: { session } } = await supabase.auth.getSession();

        if (!session) {
          throw new Error("No session created. Please try again.");
        }

        // OPTIONAL: fetch user profile / ban check
        try {
          const { data: userData } = await supabase
            .from('users')
            .select('is_banned')
            .eq('id', session.user.id)
            .single();

          if (userData?.is_banned) {
            await supabase.auth.signOut();
            throw new Error("Your account has been restricted.");
          }
        } catch (e) {
          console.warn("Profile check skipped:", e.message);
        }

        statusEl.textContent = "Success! Redirecting...";

        // Small delay for UX polish
        setTimeout(() => {
          window.location.replace("/index.html");
        }, 600);

      } catch (err) {
        console.error(err);

        statusEl.textContent = "Login failed";
        errorEl.textContent = err.message || "Something went wrong.";

        retryBtn.style.display = "inline-block";
      }
    }

    retryBtn.addEventListener('click', () => {
      window.location.href = "/login.html";
    });

    handleAuth();
  </script>
</body>
</html>
