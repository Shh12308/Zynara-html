<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Callback</title>
</head>
<body>
  <h3 id="status">Signing you in...</h3>
  <p id="error"></p>
  <button id="retry" style="display:none;">Retry</button>

  <script src="env.js"></script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  window.__ENV__.SUPABASE_URL,
  window.__ENV__.SUPABASE_ANON_KEY
);

const status = document.getElementById("status");
const errorEl = document.getElementById("error");
const retry = document.getElementById("retry");

retry.onclick = () => location.href = "/auth.html";

function fail(msg) {
  status.textContent = "Login failed";
  errorEl.textContent = msg;
  retry.style.display = "block";
}

async function run() {
  try {
    const url = new URL(window.location.href);
    const code = url.searchParams.get("code");

    // 1️⃣ OAuth login (Google, GitHub)
    if (code) {
      const { error } = await supabase.auth.exchangeCodeForSession(window.location.href);
      if (error) throw error;
    }

    // 2️⃣ IMPORTANT: wait for session properly (NOT getSession immediately)
    const { data: { session }, error } = await supabase.auth.getSession();
    if (error) throw error;

    if (!session) {
      fail("No session found. Try logging in again.");
      return;
    }

    // 3️⃣ Check user safely (no crash if missing row)
    const { data } = await supabase
      .from("users")
      .select("is_banned")
      .eq("id", session.user.id)
      .maybeSingle();

    if (data?.is_banned) {
      await supabase.auth.signOut();
      throw new Error("Account banned");
    }

    // 4️⃣ Clean URL ONLY after success
    window.history.replaceState({}, document.title, "/callback");

    status.textContent = "Success! Redirecting...";

    setTimeout(() => {
      location.replace("/index.html");
    }, 600);

  } catch (e) {
    console.error(e);
    fail(e.message || "Auth error");
  }
}

run();
</script>
</body>
</html>
