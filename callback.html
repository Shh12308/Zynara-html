<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Secure Authentication – HeloxAi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0f172a" />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ================= VARIABLES ================= */
    :root {
      --bg-deep: #050810;
      --bg-primary: #0a0f1a;
      --bg-card: rgba(15, 23, 42, 0.7);
      --bg-card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.4);
      --danger: #f43f5e;
      --danger-glow: rgba(244, 63, 94, 0.4);
      --warning: #f59e0b;
      --font-main: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ================= RESET & BASE ================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-main);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ================= DYNAMIC BACKGROUND ================= */
    #bg-canvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; opacity:0.6; }
    .gradient-orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index:1; animation: float 20s infinite alternate; pointer-events: none; }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(16,185,129,0.15), transparent 70%); top:-200px; left:-100px; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(59,130,246,0.1), transparent 70%); bottom:-150px; right:-100px; animation-delay:-10s; }
    @keyframes float { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(50px,30px) scale(1.1); } }

    /* ================= LAYOUT ================= */
    .container { position: relative; z-index: 10; width:100%; max-width:440px; padding:20px; display:flex; flex-direction: column; align-items:center; }
    .card { width:100%; background: var(--bg-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border:1px solid var(--bg-card-border); border-radius:24px; padding:40px; box-shadow:0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05); transition: all 0.5s var(--ease-smooth); position: relative; overflow: hidden; }
    .card::before { content: ''; position:absolute; top:0; left:0; right:0; height:1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); }

    /* ================= CONTENT STYLING ================= */
    .logo-area { display:flex; justify-content:center; margin-bottom:32px; }
    .logo-icon { width:48px; height:48px; background: linear-gradient(135deg, var(--accent), #059669); border-radius:14px; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px var(--accent-glow); color:white; font-weight:700; font-size:20px; }
    .status-icon { width:80px; height:80px; margin:0 auto 24px; display:flex; align-items:center; justify-content:center; border-radius:50%; background:rgba(255,255,255,0.03); position:relative; }

    .spinner-ring { position:absolute; inset:0; border-radius:50%; border:2px solid transparent; border-top-color: var(--accent); animation: spin 1s linear infinite; }
    .spinner-ring:nth-child(2) { inset:4px; border-top-color:transparent; border-right-color: rgba(16,185,129,0.3); animation-duration:1.5s; animation-direction:reverse; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ================= TEXT & BUTTONS ================= */
    h2 { font-size:20px; font-weight:600; margin-bottom:8px; text-align:center; color: var(--text-primary); letter-spacing:-0.02em; }
    p { font-size:14px; color: var(--text-secondary); text-align:center; line-height:1.5; margin-bottom:0; }

    .btn { width:100%; padding:12px; border-radius:12px; border:none; font-size:14px; font-weight:600; cursor:pointer; margin-top:24px; transition: all 0.2s var(--ease-smooth); display:none; background: rgba(255,255,255,0.05); color: var(--text-primary); outline:none; }
    .btn:hover { background: rgba(255,255,255,0.1); transform:translateY(-1px); }
    .btn-primary { background: var(--accent); color:white; box-shadow:0 4px 12px var(--accent-glow); }
    .btn-primary:hover { background:#059669; }

    /* ================= DEBUG CONSOLE ================= */
    .debug-console { margin-top:24px; background: rgba(0,0,0,0.3); border-radius:12px; padding:12px; font-family: var(--font-mono); font-size:11px; color: var(--text-muted); text-align:left; max-height:100px; overflow-y:auto; border:1px solid rgba(255,255,255,0.05); display:none; }
    .debug-console.visible { display:block; animation: fadeIn 0.3s ease; }
    .log-error { color: var(--danger); }
    .log-success { color: var(--accent); }
    .log-info { color:#3b82f6; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    @media (max-width:480px) { .card{padding:24px;border-radius:20px;} h2{font-size:18px;} .orb-1,.orb-2{display:none;} }
  </style>
</head>

<body>
  <canvas id="bg-canvas"></canvas>
  <div class="gradient-orb orb-1"></div>
  <div class="gradient-orb orb-2"></div>

  <div class="container">
    <div class="card">
      <div class="logo-area"><div class="logo-icon">H</div></div>
      <div class="status-icon" id="status-container">
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
      </div>
      <h2 id="status-title">Secure Authentication</h2>
      <p id="status-text">Initializing secure handshake...</p>
      <div class="debug-console" id="debug-console"></div>
      <button id="action-btn" class="btn btn-primary">Continue to Dashboard</button>
    </div>
  </div>

  <!-- Environment -->
  <script src="env.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const UI = {
      title: document.getElementById("status-title"),
      text: document.getElementById("status-text"),
      debug: document.getElementById("debug-console"),
      container: document.getElementById("status-container"),
      btn: document.getElementById("action-btn"),
      log(msg, type='info') { const line = document.createElement('div'); line.className=`log-${type}`; line.textContent=msg; this.debug.appendChild(line); this.debug.scrollTop=this.debug.scrollHeight; this.debug.classList.add('visible'); console.log(msg); },
      showError(msg, detail="") {
        this.title.textContent="Authentication Failed"; this.text.textContent=msg; this.title.style.color='var(--danger)';
        if(detail) this.log(detail,'error');
        this.btn.style.display='block'; this.btn.textContent="Try Again"; this.btn.classList.remove('btn-primary'); this.btn.onclick=()=>window.location.href="/auth.html";
      },
      showSuccess() {
        this.title.textContent="Welcome Back"; this.text.textContent="Authentication successful. Redirecting to dashboard...";
        this.btn.style.display='block'; this.btn.textContent="Continue to Dashboard"; this.btn.classList.add('btn-primary'); this.btn.onclick=()=>window.location.replace("/index.html");
        setTimeout(()=>window.location.replace("/index.html"),3000);
      }
    };

    async function sleep(ms){return new Promise(res=>setTimeout(res,ms));}

    // Background
    const CanvasBG={canvas:document.getElementById('bg-canvas'),ctx:null,particles:[],particleCount:40,
      init(){this.ctx=this.canvas.getContext('2d');this.resize();window.addEventListener('resize',()=>this.resize());this.createParticles();this.animate();},
      resize(){this.canvas.width=window.innerWidth; this.canvas.height=window.innerHeight;},
      createParticles(){this.particles=[]; for(let i=0;i<this.particleCount;i++){this.particles.push({x:Math.random()*this.canvas.width,y:Math.random()*this.canvas.height,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,size:Math.random()*2+1});}},
      animate(){this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height); this.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy; if(p.x<0)p.x=this.canvas.width; if(p.x>this.canvas.width)p.x=0; if(p.y<0)p.y=this.canvas.height; if(p.y>this.canvas.height)p.y=0; this.ctx.beginPath(); this.ctx.arc(p.x,p.y,p.size,0,Math.PI*2); this.ctx.fillStyle='rgba(16,185,129,0.3)'; this.ctx.fill(); }); requestAnimationFrame(()=>this.animate()); }
    };

    async function handleCallback(){
      if(!window.__ENV__) return UI.showError("Configuration Error","env.js missing.");

      const supabase = createClient(window.__ENV__.SUPABASE_URL, window.__ENV__.SUPABASE_ANON_KEY);

      // Parse hash fragment
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const access_token = params.get("access_token");
      const refresh_token = params.get("refresh_token");
      const errorParam = params.get("error");

      UI.log('Starting authentication sequence...');

      if(errorParam) return UI.showError(`OAuth Error: ${errorParam}`, params.get("error_description")||"Provider rejected the request.");

      if(!access_token) { UI.log('No access token found, redirecting to login...'); window.location.replace("/auth.html"); return; }

      UI.log('Access token detected. Setting session...');
      const { error: sessionError } = await supabase.auth.setSession({ access_token, refresh_token });
      if(sessionError) return UI.showError("Session Error", sessionError.message);

      const { data: { session } } = await supabase.auth.getSession();
      if(!session) return UI.showError("Session Verification Failed");

      UI.log(`User verified: ${session.user.email}`);
      UI.showSuccess();

      // Clean URL
      window.history.replaceState({}, "", "/callback");
      localStorage.removeItem('oauth_state');
    }

    document.addEventListener('DOMContentLoaded',()=>{ CanvasBG.init(); handleCallback(); });
  </script>
</body>
</html>
