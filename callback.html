<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Logging in…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
</head>
<body>
  <div style="text-align:center; margin-top:50px;">
    <h1>Logging you in…</h1>
    <p>Please wait while we complete your login.</p>
  </div>

  <!-- Load environment variables -->
  <script src="env.js"></script>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    if (!window.__ENV__) {
      alert("Configuration error. Please refresh.");
      throw new Error("env.js not loaded");
    }

    const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.__ENV__;
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleAuthCallback() {
      try {
        // ✅ REQUIRED for Supabase v2 OAuth (Discord especially)
        const { error } = await supabase.auth.exchangeCodeForSession(
          window.location.href
        );

        if (error) {
          console.error("OAuth exchange failed:", error);
          window.location.replace("login.html");
          return;
        }

        // Optional: verify session exists
        const { data: { session } } = await supabase.auth.getSession();

        if (!session) {
          console.error("No session after exchange.");
          window.location.replace("login.html");
          return;
        }

        // Clean URL
        window.history.replaceState({}, document.title, "/oauth-callback.html");

        // Redirect to homepage
        window.location.replace("/index.html");

      } catch (err) {
        console.error("Authentication processing failed:", err);
        window.location.replace("login.html");
      }
    }

    handleAuthCallback();
  </script>
</body>
</html>
