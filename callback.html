<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Logging in...</title>
<style>
  /* Consistent Dark Theme Styles */
  :root {
    --bg-primary: #08080c;
    --bg-secondary: #111116;
    --text-primary: #eeeef2;
    --text-secondary: #9494a6;
    --accent: #10b981;
    --error: #ef4444;
    --radius: 12px;
  }
  body {
    background-color: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }
  .container {
    text-align: center;
    max-width: 400px;
    width: 90%;
  }
  h1 { margin-bottom: 24px; font-weight: 700; }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid var(--bg-secondary);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  #status { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 20px; }
  #error { 
    display: none; 
    background: var(--bg-secondary); 
    border: 1px solid var(--error); 
    color: #ff6b6b; 
    padding: 16px; 
    border-radius: var(--radius); 
    font-size: 0.95rem; 
    line-height: 1.5;
    margin-bottom: 20px;
  }
  button#retry {
    background-color: var(--accent);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: var(--radius);
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button#retry:hover { opacity: 0.9; }
</style>
</head>
<body>

  <div class="container">
    <h1>HeloxAi</h1>
    
    <div class="spinner" id="spinner"></div>
    
    <div id="status">Verifying your login...</div>
    
    <div id="error">
      <strong>Authentication Error</strong>
      <p id="error-message">Something went wrong.</p>
      <button id="retry">Try Again</button>
    </div>
  </div>

  <!-- 
     PROVIDED ENV CONFIGURATION 
  -->
  <script src="env.js"></script>
  
  <script type="module">
    // Import createClient from CDN just in case, though env.js might rely on specific v2 path.
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";

    // Access env variables set by script tag above
    const supabaseUrl = window.__ENV__?.SUPABASE_URL || '';
    const supabaseKey = window.__ENV__?.SUPABASE_ANON_KEY || '';

    // DOM Elements
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const errorMsgEl = document.getElementById("error-message");
    const spinnerEl = document.getElementById("spinner");
    const retryBtn = document.getElementById("retry");

    retry.onclick = () => location.reload();

    // Error Handling Helper
    function showError(msg, errObj) {
      console.error(errObj || msg);
      spinnerEl.style.display = 'none';
      statusEl.style.display = 'none';
      errorEl.style.display = 'block';
      errorMsgEl.textContent = msg + (errObj ? ` (${errObj.message})` : '');
      retryBtn.style.display = 'inline-block';
    }

    // Initialize Supabase
    let sb;
    try {
      if (supabaseUrl && supabaseKey) {
        sb = createClient(supabaseUrl, supabaseKey, {
          auth: {
            storage: window.localStorage,
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true // CRITICAL: Must be true for OAuth callbacks
          }
        });
      } else {
        showError("Missing configuration (env.js or keys).", null);
        return;
      }
    } catch (e) {
      showError("Failed to initialize auth client.", e);
      return;
    }

    // Main Auth Flow
    async function run() {
      try {
        // 1. Clean URL hash (force Supabase to ignore it for a moment so we can handle errors manually if needed)
        // Note: exchangeCodeForSession usually handles this, but if we called it once and it failed, 
        // reloading the page with the hash might loop if we aren't careful.
        // Since we are in the callback, we assume the hash is correct and fresh.

        // Call Supabase
        const { data, error } = await sb.auth.exchangeCodeForSession(window.location.href);

        if (error) {
          showError("Login failed (OAuth exchange error).", error);
          return;
        }

        const session = data.session;
        const user = data.user;

        if (!session || !user) {
          showError("No session data returned. Did the link expire?", null);
          return;
        }

        // 2. Check for bans (Optional but recommended)
        // Ensure 'users' table exists and has 'is_banned' column
        statusEl.textContent = "Checking account...";
        
        try {
          // Select id, is_banned, email to be safe
          const { data: profile, error: profileError } = await sb
            .from('users')
            .select('id, is_banned, email')
            .eq('id', user.id)
            .single();

          if (profileError) {
            // Table might not exist yet (fresh DB). Safe to proceed.
            console.warn('Profile table missing or error, proceeding:', profileError);
          } else if (profile?.is_banned) {
            await sb.auth.signOut();
            showError("This account has been suspended.", null);
            return;
          }
        } catch (e) {
          // Table probably doesn't exist. Safe to proceed.
          console.warn('Profile check skipped:', e);
        }

        // 3. Success
        spinnerEl.style.display = 'none';
        statusEl.textContent = "Login successful! Redirecting...";
        
        // Clean the URL to prevent re-triggering the callback if browser keeps appending hash
        // We replace state to preserve history but remove the sensitive hash fragment
        window.history.replaceState({}, document.title, "/index.html");

        // Redirect to main app
        setTimeout(() => {
           window.location.href = "/index.html";
        }, 600);

      } catch (e) {
        showError("An unexpected error occurred.", e);
      }
    }

    // Start the process
    run();

  </script>
</body>
</html>
