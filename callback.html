<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Logging in… – HeloxAi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />

  <style>
    :root {
      --bg: #0f1724;
      --accent: #6ee7b7;
      --muted: #9aa4b2;
      --danger: #ff6b6b;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #071028 0%, #0f1724 100%);
      color: #e6eef6;
    }

    .card {
      text-align: center;
      padding: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      max-width: 380px;
      width: 100%;
    }

    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 20px;
      border: 3px solid rgba(110,231,183,0.2);
      border-top-color: #6ee7b7;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error { color: var(--danger); }
    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(90deg,#0ea5a5,#4ade80);
    }

    pre {
      margin-top: 10px;
      font-size: 12px;
      text-align: left;
      background: rgba(255,0,0,0.05);
      padding: 10px;
      border-radius: 6px;
      overflow-x: auto;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h2 id="title">Logging you in…</h2>
    <p id="text">Completing authentication…</p>
    <pre id="debug"></pre>
    <button id="btn" class="btn" style="display:none;">Back to Login</button>
  </div>

  <script src="env.js"></script>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const title = document.getElementById("title");
    const text = document.getElementById("text");
    const debug = document.getElementById("debug");
    const btn = document.getElementById("btn");
    const spinner = document.getElementById("spinner");

    function showError(msg, detail = "") {
      spinner.style.display = "none";
      title.textContent = "Login failed";
      title.classList.add("error");
      text.textContent = msg;
      debug.textContent = detail;

      btn.style.display = "inline-block";
      btn.onclick = () => window.location.href = "/auth.html";
    }

    if (!window.__ENV__) {
      showError("Missing env config", "env.js not loaded");
      throw new Error("env.js missing");
    }

    const supabase = createClient(
      window.__ENV__.SUPABASE_URL,
      window.__ENV__.SUPABASE_ANON_KEY
    );

    async function handleCallback() {
      try {
        const url = new URL(window.location.href);
        console.log("FULL URL:", url.href);
        debug.textContent = url.href;

        const code = url.searchParams.get("code");
        const error = url.searchParams.get("error");

        if (error) {
          showError("OAuth provider error", error);
          return;
        }

        // 🚨 FIX: if no code, redirect instead of hard failing
        if (!code) {
          console.warn("No code found, redirecting...");
          window.location.replace("/auth.html");
          return;
        }

        const { error: exchangeError } =
          await supabase.auth.exchangeCodeForSession(code);

        if (exchangeError) {
          showError("Session exchange failed", exchangeError.message);
          return;
        }

        const { data: { session } } =
          await supabase.auth.getSession();

        if (!session) {
          showError("No session created");
          return;
        }

        console.log("Session OK:", session);

        // Clean URL
        window.history.replaceState({}, "", "/callback");

        // Success redirect
        window.location.replace("/index.html");

      } catch (err) {
        console.error(err);
        showError("Unexpected error", err.message || String(err));
      }
    }

    handleCallback();
  </script>
</body>
</html>
