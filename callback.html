<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logging in...</title>

<style>
  :root {
    --bg-primary: #08080c;
    --bg-secondary: #111116;
    --text-primary: #eeeef2;
    --text-secondary: #9494a6;
    --accent: #10b981;
    --error: #ef4444;
    --radius: 12px;
  }

  body {
    background-color: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }

  .container {
    text-align: center;
    max-width: 400px;
    width: 90%;
  }

  h1 { margin-bottom: 24px; font-weight: 700; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid var(--bg-secondary);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  #status {
    font-size: 1.1rem;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }

  #error {
    display: none;
    background: var(--bg-secondary);
    border: 1px solid var(--error);
    color: #ff6b6b;
    padding: 16px;
    border-radius: var(--radius);
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 20px;
  }

  button#retry {
    background-color: var(--accent);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: var(--radius);
    font-weight: 600;
    cursor: pointer;
  }

  button#retry:hover {
    opacity: 0.9;
  }
</style>
</head>

<body>
  <div class="container">
    <h1>HeloxAi</h1>

    <div class="spinner" id="spinner"></div>
    <div id="status">Verifying your login...</div>

    <div id="error">
      <strong>Authentication Failed</strong>
      <p id="error-message">Something went wrong.</p>
      <button id="retry">Try Again</button>
    </div>
  </div>

  <script src="env.js"></script>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabaseUrl = window.__ENV__?.SUPABASE_URL || "";
    const supabaseKey = window.__ENV__?.SUPABASE_ANON_KEY || "";

    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const errorMsgEl = document.getElementById("error-message");
    const spinnerEl = document.getElementById("spinner");
    const retryBtn = document.getElementById("retry");

    retryBtn.onclick = () => location.reload();

    let safetyTimer = setTimeout(() => {
      showError("Login timed out. Please try again.");
    }, 8000);

    function stopTimer() {
      clearTimeout(safetyTimer);
    }

    function showError(msg, errObj) {
      console.error(errObj || msg);

      spinnerEl.style.display = "none";
      statusEl.style.display = "none"; // ✅ FIXED

      errorEl.style.display = "block";
      errorMsgEl.textContent = msg + (errObj?.message ? ` (${errObj.message})` : "");
    }

    let sb;

    try {
      if (!supabaseUrl || !supabaseKey) {
        throw new Error("Missing Supabase env variables");
      }

      sb = createClient(supabaseUrl, supabaseKey, {
        auth: {
          storage: localStorage,
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      });

    } catch (e) {
      showError("Failed to initialize auth client.", e);
    }

    async function run() {
      try {
        statusEl.textContent = "Completing login...";

        // ✅ Correct Supabase OAuth callback handling
        const { data, error } = await sb.auth.exchangeCodeForSession(window.location.href);

        if (error) throw error;

        const session = data?.session;
        const user = data?.user;

        if (!session || !user) {
          showError("Session missing or expired.");
          return;
        }

        statusEl.textContent = "Checking account...";

        let isBanned = false;

        try {
          const { data: profile } = await sb
            .from("users")
            .select("is_banned")
            .eq("id", user.id)
            .single();

          if (profile?.is_banned) isBanned = true;

        } catch (err) {
          console.warn("Ban check skipped:", err);
        }

        if (isBanned) {
          throw new Error("Account suspended");
        }

        stopTimer();

        spinnerEl.style.display = "none";
        statusEl.textContent = "Success! Redirecting...";

        setTimeout(() => {
          window.location.href = "/index.html";
        }, 600);

      } catch (e) {
        stopTimer();
        showError("Login failed.", e);
      }
    }

    run();
  </script>
</body>
</html>
