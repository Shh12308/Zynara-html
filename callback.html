<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Callback</title>
</head>
<body>
  <h3 id="status">Signing you in...</h3>
  <p id="error"></p>
  <button id="retry" style="display:none;">Retry</button>

  <script src="env.js"></script>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const status = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const retry = document.getElementById("retry");

    retry.onclick = () => location.href = "/login.html";

    function fail(msg) {
      status.textContent = "Login failed";
      errorEl.textContent = msg;
      retry.style.display = "block";
    }

    const ENV = window.__ENV__;
    if (!ENV?.SUPABASE_URL || !ENV?.SUPABASE_ANON_KEY) {
      fail("Missing config");
      throw new Error("Missing env");
    }

    const supabase = createClient(ENV.SUPABASE_URL, ENV.SUPABASE_ANON_KEY);

    async function getSessionSafe() {
      const { data, error } = await supabase.auth.getSession();
      if (error) throw error;
      return data.session;
    }

    async function handleUser(session) {
      if (!session) throw new Error("No session");

      // Check banned user
      const { data, error } = await supabase
        .from("users")
        .select("is_banned")
        .eq("id", session.user.id)
        .single();

      if (error && error.code !== "PGRST116") throw error;

      if (data?.is_banned) {
        await supabase.auth.signOut();
        throw new Error("Account banned");
      }

      status.textContent = "Success! Redirecting...";
      setTimeout(() => location.replace("/index.html"), 800);
    }

    async function run() {
      try {
        const url = new URL(window.location.href);
        const code = url.searchParams.get("code");

        // 🟢 CASE 1: OAuth (Google, GitHub, etc.)
        if (code) {
          const { error } = await supabase.auth.exchangeCodeForSession(window.location.href);
          if (error) throw error;

          const session = await getSessionSafe();
          return handleUser(session);
        }

        // 🟡 CASE 2: Email magic link / OTP (Supabase handles automatically)
        // Session is already stored in URL fragment
        const session = await getSessionSafe();

        if (session) {
          return handleUser(session);
        }

        // 🔴 CASE 3: Email/password login (should NOT hit callback normally)
        // fallback if user manually lands here
        fail("No authentication data found. Please log in again.");
        
      } catch (e) {
        console.error(e);
        fail(e.message || "Auth error");
      }
    }

    run();
  </script>
</body>
</html>
