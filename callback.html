<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Logging in… – HeloxAi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />

  <style>
    :root {
      --bg: #0f1724;
      --accent: #6ee7b7;
      --muted: #9aa4b2;
      --danger: #ff6b6b;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      background: linear-gradient(180deg, #071028 0%, #0f1724 100%);
      color: #e6eef6;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .callback-card {
      text-align: center;
      max-width: 380px;
      width: 100%;
      padding: 48px 32px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(2,6,23,0.75);
      border: 1px solid rgba(255,255,255,0.03);
    }

    .callback-card h1 {
      margin: 0 0 8px 0;
      font-size: 22px;
      letter-spacing: -0.3px;
    }

    .callback-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    /* Spinner ring */
    .spinner-ring {
      width: 44px;
      height: 44px;
      margin: 0 auto 24px auto;
      border: 3px solid rgba(110, 231, 183, 0.12);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error state */
    .callback-card.error .spinner-ring {
      display: none;
    }

    .error-icon {
      display: none;
      width: 44px;
      height: 44px;
      margin: 0 auto 24px auto;
      border-radius: 50%;
      background: rgba(255, 107, 107, 0.1);
      color: var(--danger);
      font-size: 22px;
      line-height: 44px;
    }

    .callback-card.error .error-icon {
      display: block;
    }

    .callback-card.error h1 {
      color: var(--danger);
    }

    .retry-btn {
      display: none;
      margin-top: 20px;
      padding: 12px 28px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #0ea5a5, #4ade80);
      color: #062022;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .callback-card.error .retry-btn {
      display: inline-block;
    }

    .retry-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 20px rgba(78, 222, 128, 0.2);
    }

    .error-detail {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(255, 107, 107, 0.06);
      border: 1px solid rgba(255, 107, 107, 0.1);
      color: var(--muted);
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      word-break: break-word;
      text-align: left;
    }

    .callback-card.error .error-detail {
      display: block;
    }
  </style>
</head>
<body>

  <div class="callback-card" id="callback-card">
    <div class="spinner-ring" aria-hidden="true"></div>
    <div class="error-icon" aria-hidden="true">&#10007;</div>
    <h1 id="status-title">Logging you in&hellip;</h1>
    <p id="status-text">Please wait while we complete your authentication.</p>
    <div class="error-detail" id="error-detail"></div>
    <button class="retry-btn" id="retry-btn">Back to Login</button>
  </div>

  <script src="env.js"></script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const card     = document.getElementById("callback-card");
const title    = document.getElementById("status-title");
const text     = document.getElementById("status-text");
const detail   = document.getElementById("error-detail");
const retryBtn = document.getElementById("retry-btn");

function showError(message, raw) {
  card.classList.add("error");
  title.textContent = "Login failed";
  text.textContent  = message;
  detail.textContent = raw || "";
  retryBtn.onclick = () => window.location.replace("auth.html");
}

/* ENV CHECK */
if (!window.__ENV__) {
  showError("Configuration error", "env.js not loaded");
  throw new Error("env.js missing");
}

const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.__ENV__;
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function handleAuthCallback() {
  try {
    const url = new URL(window.location.href);

    const code  = url.searchParams.get("code");
    const error = url.searchParams.get("error");

    console.log("OAuth URL:", window.location.href);

    /* Handle provider-side error */
    if (error) {
      showError("OAuth provider returned an error.", error);
      return;
    }

    /* 🚨 CRITICAL: Ensure code exists */
    if (!code) {
      showError(
        "Missing authentication code.",
        "No ?code= found in URL. Check OAuth redirect configuration."
      );
      return;
    }

    /* ✅ Correct usage */
    const { error: exchangeError } = await supabase.auth.exchangeCodeForSession(code);

    if (exchangeError) {
      console.error("Exchange error:", exchangeError);
      showError("Authentication failed.", exchangeError.message);
      return;
    }

    const { data: { session } } = await supabase.auth.getSession();

    if (!session) {
      showError("No session created after login.");
      return;
    }

    /* Clean URL (IMPORTANT: match your real route) */
    window.history.replaceState({}, document.title, "/callback");

    /* Redirect */
    window.location.replace("/index.html");

  } catch (err) {
    console.error(err);
    showError("Unexpected error.", err.message || String(err));
  }
}

handleAuthCallback();
</script>
</body>
</html>
