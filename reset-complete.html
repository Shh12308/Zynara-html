<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Reset Password – HeloxAi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root {
  --bg: #0f1724;
  --card: #111827;
  --accent: #facc15; /* Snapchat yellow vibe */
  --text: #e5e7eb;
  --muted: #9ca3af;
  --radius: 18px;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

html, body {
  height: 100%;
  margin: 0;
  background: radial-gradient(circle at top, #1f2937, #020617);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
}

.card {
  width: 100%;
  max-width: 380px;
  background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
  border-radius: var(--radius);
  padding: 28px 24px 32px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.06);
}

h1 {
  font-size: 22px;
  margin: 0 0 8px;
  text-align: center;
}

p {
  font-size: 14px;
  color: var(--muted);
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: #020617;
  color: var(--text);
  font-size: 16px;
  outline: none;
  margin-bottom: 14px;
}

input::placeholder {
  color: #6b7280;
}

button {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(90deg, #fde047, #facc15);
  color: #111827;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 10px 30px rgba(250,204,21,0.35);
}

#msg {
  text-align: center;
  margin-top: 14px;
  font-size: 14px;
  min-height: 1.4em;
}

.success {
  color: #4ade80;
}

.error {
  color: #fb7185;
}
</style>
</head>

<body>
  <div class="card">
    <h1>Set new password</h1>
    <p>Choose a strong password to secure your account.</p>

    <input
      type="password"
      id="password"
      placeholder="New password"
      autocomplete="new-password"
    />

    <button id="update-btn">Update password</button>

    <div id="msg"></div>
  </div>

<script src="/env.js"></script>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  if (!window.__ENV__) {
    throw new Error("env.js not loaded");
  }

  const {
    SUPABASE_URL,
    SUPABASE_ANON_KEY,
    RECAPTCHA_SITE_KEY
  } = window.__ENV__;

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const btn = document.getElementById("update-btn");
const msg = document.getElementById("msg");

function strongEnough(pw) {
  return (
    pw.length >= 8 &&
    /[A-Z]/.test(pw) &&
    /[a-z]/.test(pw) &&
    /[0-9]/.test(pw) &&
    /[^A-Za-z0-9]/.test(pw)
  );
}

btn.addEventListener("click", async () => {
  const password = document.getElementById("password").value;

  msg.textContent = "";
  msg.className = "";

  if (!strongEnough(password)) {
    msg.textContent =
      "Use 8+ characters with upper, lower, number & symbol.";
    msg.className = "error";
    return;
  }

  const { error } = await supabase.auth.updateUser({ password });

  if (error) {
    msg.textContent = error.message;
    msg.className = "error";
  } else {
    msg.textContent = "Password updated! Redirecting…";
    msg.className = "success";

    setTimeout(() => {
      window.location.href = "/login.html";
    }, 1800);
  }
});
</script>
</body>
</html>
