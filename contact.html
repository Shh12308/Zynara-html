<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact Zynara Support</title>

<style>
:root {
  --bg: #f7f9fc;
  --card: #ffffff;
  --text: #111827;
  --muted: #6b7280;
  --accent: #2563eb;
  --danger: #dc2626;
  --radius: 14px;
}

body.dark {
  --bg: #0f172a;
  --card: #020617;
  --text: #e5e7eb;
  --muted: #9ca3af;
}

body {
  margin: 0;
  font-family: Inter, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 520px;
  background: var(--card);
  padding: 2rem;
  border-radius: var(--radius);
  box-shadow: 0 20px 50px rgba(0,0,0,.2);
  position: relative;
}

/* Theme toggle */
#darkToggle {
  position: absolute;
  top: 16px;
  right: 16px;
  background: transparent;
  border: none;
  font-size: 20px;
  cursor: pointer;
}

.logo {
  text-align: center;
  margin-bottom: 1rem;
}

.logo img {
  height: 60px;
}

h2 {
  text-align: center;
  margin-bottom: .25rem;
}

.note {
  text-align: center;
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 1.25rem;
}

.note a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 600;
}

input, select, textarea {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,.1);
  background: transparent;
  color: var(--text);
  font-size: 15px;
}

textarea {
  resize: none;
  min-height: 110px;
}

button[type="submit"] {
  width: 100%;
  margin-top: 14px;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg,#2563eb,#1d4ed8);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

button:disabled {
  opacity: .6;
  cursor: not-allowed;
}

#msg {
  text-align: center;
  margin-top: 14px;
  font-weight: 600;
}

#msg.error { color: var(--danger); }
#msg.success { color: #16a34a; }

/* Honeypot */
.hp {
  position: absolute;
  left: -9999px;
  opacity: 0;
  height: 0;
}
</style>
</head>

<body>

<div class="container">
  <button id="darkToggle" aria-label="Toggle theme">🌙</button>

  <div class="logo">
    <img src="https://zynara.xyz/logo.png" alt="Zynara logo">
  </div>

  <h2>Contact Zynara Support</h2>

  <p class="note">
    If you don’t receive a response within 15 minutes, please email
    <a href="mailto:support@zynara.xyz">support@zynara.xyz</a>
  </p>

  <form id="supportForm" novalidate>
    <!-- Honeypot -->
    <input class="hp" type="text" name="company" tabindex="-1" autocomplete="off">

    <select name="category" required>
      <option value="">Select category</option>
      <option>Billing</option>
      <option>Bug / Issue</option>
      <option>Feature Request</option>
      <option>Feedback</option>
      <option>Other</option>
    </select>

    <input type="text" name="name" placeholder="Your name" required>
    <input type="email" name="email" placeholder="Your email" required>
    <textarea name="message" placeholder="Describe your issue..." required></textarea>

    <input type="file" name="attachment">

    <button type="submit" id="submitBtn">Send Message</button>
    <div id="msg" aria-live="polite"></div>
  </form>
</div>
 <script src="env.js"></script>
<script>
const SUPABASE_ANON_KEY = window.ENV?.SUPABASE_ANON_KEY;

if (!SUPABASE_ANON_KEY) {
  console.error("Missing SUPABASE_ANON_KEY");
}

const form = document.getElementById("supportForm");
const msg = document.getElementById("msg");
const btn = document.getElementById("submitBtn");
const darkToggle = document.getElementById("darkToggle");
const messageField = form.querySelector('textarea[name="message"]');

/* Theme toggle */
darkToggle.addEventListener("click", () => {
  document.body.classList.toggle("dark");
  darkToggle.textContent =
    document.body.classList.contains("dark") ? "☀️" : "🌙";
});

/* Auto-resize textarea */
messageField.addEventListener("input", e => {
  e.target.style.height = "auto";
  e.target.style.height = e.target.scrollHeight + "px";
});

/* Submit */
form.addEventListener("submit", async e => {
  e.preventDefault();
  msg.textContent = "";
  msg.className = "";
  btn.disabled = true;

  const data = new FormData(form);

  // Honeypot
  if (data.get("company")) {
    btn.disabled = false;
    return;
  }

  try {
  const res = await fetch(
  "https://xmmqhahsfhlmplbuchat.supabase.co/functions/v1/quick-responder",
  {
    method: "POST",
    body: data,
    headers: {
      "Accept": "application/json"
    }
  }
);

    const json = await res.json();
    if (!res.ok) throw new Error(json?.error || "Failed");

    msg.textContent = "✅ Message sent successfully";
    msg.className = "success";
    form.reset();

  } catch (err) {
    console.error(err);
    msg.textContent = "❌ Unable to send message. Please try again later.";
    msg.className = "error";
  } finally {
    btn.disabled = false;
  }
});
</script>

</body>
</html>
