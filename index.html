<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HeloxAI - Advanced Assistant</title>

    <!-- ================= META & PWA ================= -->
    <meta name="theme-color" content="#0a0a0b">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192x192.png">

    <!-- ================= LIBRARIES ================= -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ================= ENVIRONMENT VARIABLES ================= -->
    <!-- Loads configuration from external file -->
    <script src="env.js"></script>

    <!-- ================= STYLES ================= -->
    <style>
        /* --- Variables --- */
        :root {
            --bg-primary: #0a0a0b;
            --bg-secondary: #111113;
            --bg-tertiary: #18181b;
            --fg-primary: #fafafa;
            --fg-secondary: #a1a1aa;
            --accent: #10b981;
            --border: #27272a;
        }

        /* --- Theme Definitions --- */
        [data-theme="light"] { --bg-primary: #ffffff; --bg-secondary: #f4f4f5; --bg-tertiary: #e4e4e7; --fg-primary: #18181b; --fg-secondary: #3f3f46; --accent: #059669; --border: #e4e4e7; }
        [data-theme="ocean"] { --bg-primary: #0b1215; --bg-secondary: #111a1f; --bg-tertiary: #182329; --fg-primary: #e0f2fe; --fg-secondary: #94a3b8; --accent: #0ea5e9; --border: #1e3a5f; }
        [data-theme="midnight"] { --bg-primary: #0f0a1a; --bg-secondary: #160f24; --bg-tertiary: #1e152e; --fg-primary: #f5f3ff; --fg-secondary: #c4b5fd; --accent: #a855f7; --border: #3b1d6e; }
        [data-theme="forest"] { --bg-primary: #071207; --bg-secondary: #0f1f0f; --bg-tertiary: #163016; --fg-primary: #ecfdf5; --fg-secondary: #a7f3d0; --accent: #22c55e; --border: #166534; }
        [data-theme="sunset"] { --bg-primary: #1a0a0a; --bg-secondary: #2a1111; --bg-tertiary: #3d1a1a; --fg-primary: #fef2f2; --fg-secondary: #fca5a5; --accent: #f97316; --border: #7f1d1d; }
        [data-theme="cyberpunk"] { --bg-primary: #050505; --bg-secondary: #0a0a0a; --bg-tertiary: #1a1a1a; --fg-primary: #fff; --fg-secondary: #ccc; --accent: #f0e100; --border: #333; }
        [data-theme="arctic"] { --bg-primary: #f0f9ff; --bg-secondary: #e0f2fe; --bg-tertiary: #bae6fd; --fg-primary: #0c4a6e; --fg-secondary: #0369a1; --accent: #0284c7; --border: #7dd3fc; }
        [data-theme="coffee"] { --bg-primary: #1c1412; --bg-secondary: #2a201b; --bg-tertiary: #3b2a22; --fg-primary: #fef3c7; --fg-secondary: #d4a574; --accent: #d97706; --border: #5c3d2e; }
        [data-theme="lavender"] { --bg-primary: #13111c; --bg-secondary: #1c1830; --bg-tertiary: #282244; --fg-primary: #f5f3ff; --fg-secondary: #c4b5fd; --accent: #8b5cf6; --border: #4c1d95; }
        [data-theme="mint"] { --bg-primary: #042f2e; --bg-secondary: #064e3b; --bg-tertiary: #065f46; --fg-primary: #ecfdf5; --fg-secondary: #6ee7b7; --accent: #10b981; --border: #047857; }
        [data-theme="blood"] { --bg-primary: #0a0000; --bg-secondary: #1a0000; --bg-tertiary: #2a0000; --fg-primary: #fff0f0; --fg-secondary: #f87171; --accent: #ef4444; --border: #450a0a; }
        [data-theme="space"] { --bg-primary: #000000; --bg-secondary: #09090b; --bg-tertiary: #111118; --fg-primary: #e4e4e7; --fg-secondary: #a1a1aa; --accent: #6366f1; --border: #27272a; }
        [data-theme="sepia"] { --bg-primary: #f5ebe0; --bg-secondary: #ede0d4; --bg-tertiary: #e6d2c0; --fg-primary: #5c4033; --fg-secondary: #8b7355; --accent: #b45309; --border: #d5c4a1; }

        body {
            background: var(--bg-primary);
            color: var(--fg-primary);
            font-family: 'Inter', sans-serif;
            transition: background 0.3s, color 0.3s;
        }

        /* --- Scrollbars --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* --- Markdown & Prose --- */
        .prose {
            line-height: 1.75;
            color: var(--fg-primary);
            max-width: 100%;
            font-size: 15px;
        }
        .prose p { margin-bottom: 1em; }
        .prose a { color: var(--accent); text-decoration: underline; }
        .prose blockquote {
            border-left: 3px solid var(--accent);
            padding: 0.5em 1em;
            margin: 1em 0;
            color: var(--fg-secondary);
            background: var(--bg-tertiary);
            border-radius: 0 8px 8px 0;
        }

        /* --- Code Blocks --- */
        .code-block-wrapper {
            position: relative;
            margin: 1em 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .code-header {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            font-size: 12px;
            color: var(--fg-secondary);
        }
        pre code {
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 14px;
            display: block;
            padding: 1em;
            overflow-x: auto;
            background: var(--bg-secondary) !important;
        }

        /* --- Message Actions --- */
        .msg-container { position: relative; }
        .msg-actions { opacity: 0; transition: opacity 0.2s; }
        .msg-container:hover .msg-actions { opacity: 1; }
        
        .msg-btn {
            padding: 0.3rem;
            border-radius: 0.25rem;
            color: var(--fg-secondary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            background: transparent;
        }
        .msg-btn:hover { color: var(--fg-primary); background: var(--bg-tertiary); }
        .msg-btn.active { color: var(--accent); }

        /* --- Animations --- */
        .recording-pulse { animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring { 
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 
            100% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 
        }

        .fade-in { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce { 
            0%, 80%, 100% { transform: translateY(0); } 
            40% { transform: translateY(-6px); } 
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden" data-theme="dark">

    <!-- ================= SIDEBAR ================= -->
    <aside id="sidebar" class="w-72 h-full flex flex-col fixed md:relative z-50 -translate-x-full md:translate-x-0 transition-transform duration-300 border-r" style="background: var(--bg-secondary); border-color: var(--border);">
        
        <!-- Top Header -->
        <div class="p-3 border-b" style="border-color: var(--border);">
            <div class="flex items-center justify-between mb-2">
                <h1 class="text-lg font-bold flex items-center gap-2" style="color: var(--accent);">
                   <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                   HeloxAI
                </h1>
                <button onclick="toggleSidebar()" class="md:hidden p-1.5 rounded-lg hover:bg-tertiary transition-colors" style="color: var(--fg-secondary);">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 px-3 py-2 rounded-lg font-medium text-white transition-colors text-sm" style="background: var(--accent);">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                New Chat
            </button>
        </div>

        <!-- Chat History -->
        <div class="flex-1 overflow-y-auto p-2 space-y-0.5">
            <div id="chatHistory" class="space-y-0.5">
                <div class="p-3 text-center text-xs opacity-40 mt-4">No chat history.</div>
            </div>
        </div>

        <!-- Bottom Actions -->
        <div class="p-2 border-t space-y-0.5" style="border-color: var(--border);">
            <a href="premium.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-tertiary transition-colors group">
                <div class="w-6 h-6 rounded-md bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center text-white text-xs font-bold">P</div>
                <span class="text-sm font-medium" style="color: var(--fg-primary);">Upgrade Plan</span>
            </a>
            <a href="settings.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-tertiary transition-colors">
                <svg class="w-6 h-6 p-1" style="color: var(--fg-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <span class="text-sm" style="color: var(--fg-secondary);">Settings</span>
            </a>
        </div>

        <!-- User & Theme -->
        <div class="p-2 border-t" style="border-color: var(--border);">
            <div class="flex items-center justify-between mb-1 px-1">
                <span class="text-[10px] uppercase tracking-wider font-bold" style="color: var(--fg-muted);">Theme</span>
                <select id="themeSelector" onchange="setTheme(this.value)" class="text-xs rounded px-1 py-0.5 border outline-none bg-transparent" style="border-color: transparent; color: var(--fg-secondary);">
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                    <option value="ocean">Ocean</option>
                    <option value="midnight">Midnight</option>
                    <option value="forest">Forest</option>
                    <option value="sunset">Sunset</option>
                    <option value="cyberpunk">Cyberpunk</option>
                    <option value="arctic">Arctic</option>
                    <option value="coffee">Coffee</option>
                    <option value="lavender">Lavender</option>
                    <option value="mint">Mint</option>
                    <option value="blood">Blood</option>
                    <option value="space">Space</option>
                    <option value="sepia">Sepia</option>
                </select>
            </div>
            <div id="authArea">
                <button id="loginBtn" onclick="handleAuth()" class="w-full text-center p-2 rounded-lg text-xs font-medium" style="background: var(--bg-tertiary); color: var(--fg-primary);">Sign In</button>
                <div id="userInfo" class="hidden flex items-center gap-2 p-1.5 rounded-lg hover:bg-tertiary transition-colors cursor-pointer">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style="background: var(--accent);" id="userAvatar">G</div>
                    <div class="flex-1 min-w-0">
                        <div class="text-xs font-medium truncate" id="userName">Guest</div>
                        <div class="text-[10px]" style="color: var(--fg-muted);" id="userPlanText">Free Plan</div>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Sidebar Overlay -->
    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden md:hidden"></div>

    <!-- ================= MAIN CONTENT ================= -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        
        <!-- Header -->
        <header class="h-12 flex items-center px-4 border-b z-20" style="background: var(--bg-primary); border-color: var(--border);">
            <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-lg mr-2 hover:bg-tertiary" style="color: var(--fg-secondary);">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <div class="flex-1"><h2 id="chatTitle" class="font-semibold text-sm truncate">HeloxAI</h2></div>
            <div id="userBadge" class="hidden text-[10px] px-2 py-0.5 rounded-full bg-emerald-500/20 text-emerald-400 font-medium uppercase">Pro</div>
        </header>

        <!-- Chat Area -->
        <div id="chatArea" class="flex-1 overflow-y-auto">
            <!-- Welcome Screen -->
            <div id="welcomeScreen" class="h-full flex flex-col items-center justify-center p-8 text-center">
                <div class="w-14 h-14 rounded-2xl flex items-center justify-center mb-4 shadow-lg" style="background: linear-gradient(135deg, var(--accent), #3b82f6);">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <h2 class="text-xl font-bold mb-1">Welcome to HeloxAI</h2>
                <p class="mb-6 text-sm" style="color: var(--fg-secondary);">Ask anything, generate code, or analyze files.</p>
                <div class="grid grid-cols-2 gap-2 max-w-sm w-full">
                    <button onclick="setInput('Explain quantum computing in simple terms')" class="p-3 rounded-xl border text-left hover:border-accent transition-colors text-xs" style="background: var(--bg-secondary); border-color: var(--border);">Explain Concept</button>
                    <button onclick="setInput('Write a Python script to sort files')" class="p-3 rounded-xl border text-left hover:border-accent transition-colors text-xs" style="background: var(--bg-secondary); border-color: var(--border);">Code Helper</button>
                </div>
            </div>
            
            <!-- Messages Container -->
            <div id="messages" class="max-w-3xl mx-auto py-4 px-4 space-y-4 hidden"></div>
        </div>

        <!-- Input Area -->
        <div class="border-t p-3" style="background: var(--bg-primary); border-color: var(--border);">
            <div class="max-w-3xl mx-auto flex items-end gap-2">
                
                <!-- Action Menu Trigger -->
                <button onclick="toggleActionSheet()" class="p-2 rounded-xl flex-shrink-0 hover:bg-tertiary transition-colors" style="background: var(--bg-tertiary);">
                    <svg class="w-5 h-5" style="color: var(--fg-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                </button>

                <div class="flex-1 relative">
                    <!-- Voice Recording Overlay -->
                    <div id="voiceIndicator" class="hidden absolute inset-0 bg-red-500/10 rounded-2xl items-center justify-center gap-2 text-red-400 border border-red-500/30 z-10 pointer-events-none">
                        <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                        <span class="text-xs font-medium">Listening...</span>
                    </div>

                    <!-- Text Input -->
                    <textarea id="input" rows="1" class="w-full resize-none rounded-2xl px-4 py-2.5 pr-24 outline-none focus:ring-1 transition-all text-sm" style="background: var(--bg-tertiary); color: var(--fg-primary); --tw-ring-color: var(--accent);" placeholder="Message HeloxAI..."></textarea>
                    
                    <div class="absolute right-2 bottom-1.5 flex items-center gap-0.5">
                        <!-- Mic Button -> /stt -->
                        <button id="micBtn" class="p-1.5 rounded-lg hover:bg-white/10 transition-opacity" title="Hold to Speak">
                            <svg class="w-5 h-5" style="color: var(--fg-secondary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 10v1a7 7 0 01-14 0v-1M12 18v4m-4 0h8"/>
                            </svg>
                        </button>
                        
                        <!-- Send Button -> /ask/universal -->
                        <button id="sendBtn" onclick="sendMessage()" class="hidden p-1.5 rounded-lg text-white transition-opacity" style="background: var(--accent);" title="Send">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                        </button>
                        
                        <!-- Stop Button -> /stop -->
                        <button id="stopBtn" onclick="stopStream()" class="hidden p-1.5 rounded-lg bg-red-500 text-white transition-opacity" title="Stop">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- ================= ACTION SHEET ================= -->
    <div id="actionSheet" class="fixed inset-0 z-50 hidden">
        <div onclick="toggleActionSheet()" class="absolute inset-0 bg-black/60"></div>
        <div class="absolute bottom-0 left-0 right-0 rounded-t-2xl p-4 transform translate-y-full transition-transform duration-300" id="actionSheetContent" style="background: var(--bg-secondary);">
            <div class="w-10 h-1 rounded-full mx-auto mb-3" style="background: var(--border);"></div>
            <div class="grid grid-cols-3 gap-2 text-center mb-3">
                <button onclick="handleAction('code')" class="flex flex-col items-center gap-2 p-3 rounded-xl" style="background: var(--bg-tertiary);">
                    <svg class="w-6 h-6 mb-1 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
                    <span class="text-xs">Code</span>
                </button>
                <button onclick="handleAction('upload')" class="flex flex-col items-center gap-2 p-3 rounded-xl" style="background: var(--bg-tertiary);">
                    <svg class="w-6 h-6 mb-1 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                    <span class="text-xs">Upload</span>
                </button>
                <button onclick="handleAction('search')" class="flex flex-col items-center gap-2 p-3 rounded-xl" style="background: var(--bg-tertiary);">
                    <svg class="w-6 h-6 mb-1 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <span class="text-xs">Search</span>
                </button>
            </div>
            <input type="file" id="fileInput" class="hidden" onchange="handleFile(event)" />
        </div>
    </div>

    <!-- ================= EDIT MODAL ================= -->
    <div id="editModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/60">
        <div class="w-full max-w-lg rounded-2xl p-5" style="background: var(--bg-secondary);">
            <h3 class="text-base font-bold mb-3">Edit Message</h3>
            <textarea id="editInput" class="w-full h-28 p-3 rounded-lg border resize-none text-sm" style="background: var(--bg-tertiary); border-color: var(--border); color: var(--fg-primary);"></textarea>
            <div class="flex justify-end gap-2 mt-3">
                <button onclick="closeEditModal()" class="px-3 py-1.5 rounded-lg text-xs font-medium" style="background: var(--bg-tertiary);">Cancel</button>
                <button onclick="saveEdit()" class="px-3 py-1.5 rounded-lg text-xs font-medium text-white" style="background: var(--accent);">Save & Submit</button>
            </div>
        </div>
    </div>

    <!-- ================= TOAST ================= -->
    <div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg shadow-lg transition-all duration-300 opacity-0 transform translate-y-4 pointer-events-none text-xs" style="background: var(--bg-elevated); border: 1px solid var(--border);">
        <span id="toastMsg"></span>
    </div>

    <!-- ================= LOGIC ================= -->
    <script>
        // --- Check if window.__ENV__ loaded ---
        if (typeof window.__ENV__ === 'undefined') {
            console.error("Configuration Error: env.js is not loaded or window.__ENV__ is not defined.");
            // Fallback configuration
            window.__ENV__ = {
                SUPABASE_URL: 'FALLBACK_URL',
                SUPABASE_ANON_KEY: 'FALLBACK_KEY',
                FREE_AI_URL: 'https://billy-free-ai-production.up.railway.app',
                PREMIUM_AI_URL: 'http://localhost:3001'
            };
        }

        // --- State Management ---
        const STATE = {
            user: null,
            supabase: null,
            chats: [],
            currentChatId: null,
            messages: [],
            streaming: false,
            controller: null,
            editingMsgId: null,
            mediaRecorder: null,
            audioChunks: [],
            isRecording: false
        };

        // --- DOM References ---
        const dom = {
            sidebar: document.getElementById('sidebar'),
            overlay: document.getElementById('overlay'),
            messages: document.getElementById('messages'),
            welcome: document.getElementById('welcomeScreen'),
            input: document.getElementById('input'),
            sendBtn: document.getElementById('sendBtn'),
            stopBtn: document.getElementById('stopBtn'),
            micBtn: document.getElementById('micBtn'),
            voiceIndicator: document.getElementById('voiceIndicator'),
            toast: document.getElementById('toast'),
            toastMsg: document.getElementById('toastMsg'),
            themeSelector: document.getElementById('themeSelector'),
            userBadge: document.getElementById('userBadge'),
            loginBtn: document.getElementById('loginBtn'),
            userInfo: document.getElementById('userInfo'),
            userName: document.getElementById('userName'),
            userPlanText: document.getElementById('userPlanText'),
            userAvatar: document.getElementById('userAvatar'),
            editModal: document.getElementById('editModal'),
            editInput: document.getElementById('editInput'),
            chatHistory: document.getElementById('chatHistory'),
            actionSheet: document.getElementById('actionSheet'),
            actionSheetContent: document.getElementById('actionSheetContent'),
            fileInput: document.getElementById('fileInput')
        };

        // --- Initialization ---
        async function init() {
            initTheme();
            await initSupabase();
            initVoiceListeners();
            await requestMediaPermissions();
            updateUIState();
        }

        function initTheme() {
            const t = localStorage.getItem('theme') || 'dark';
            setTheme(t);
        }

        async function initSupabase() {
            if (!window.__ENV__.SUPABASE_URL || window.__ENV__.SUPABASE_URL === 'FALLBACK_URL') {
                setGuestUser();
                return;
            }
            STATE.supabase = supabase.createClient(window.__ENV__.SUPABASE_URL, window.__ENV__.SUPABASE_ANON_KEY);
            const { data: { session } } = await STATE.supabase.auth.getSession();
            if (session) await fetchUserProfile(session.user);
            
            STATE.supabase.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session) await fetchUserProfile(session.user);
                else if (event === 'SIGNED_OUT') setGuestUser();
            });
        }

        async function requestMediaPermissions() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                stream.getTracks().forEach(track => track.stop());
            } catch (err) {
                showToast("Mic/Camera access denied");
            }
        }

        async function fetchUserProfile(user) {
            let plan = user.user_metadata?.plan || 'free';
            STATE.user = { id: user.id, email: user.email, plan };
            updateUserUI();
        }

        function setGuestUser() {
            STATE.user = { id: 'guest', email: 'Guest', plan: 'free' };
            updateUserUI();
        }

        function updateUserUI() {
            const isGuest = !STATE.user || STATE.user.id === 'guest';
            if (isGuest) {
                dom.loginBtn.classList.remove('hidden');
                dom.userInfo.classList.add('hidden');
                dom.userBadge.classList.add('hidden');
            } else {
                dom.loginBtn.classList.add('hidden');
                dom.userInfo.classList.remove('hidden');
                dom.userAvatar.textContent = STATE.user.email[0].toUpperCase();
                dom.userName.textContent = STATE.user.email;
                if (STATE.user.plan === 'premium' || STATE.user.plan === 'lifetime') {
                    dom.userBadge.classList.remove('hidden');
                    dom.userBadge.textContent = 'Pro';
                    dom.userPlanText.textContent = "Premium Plan";
                } else {
                    dom.userBadge.classList.add('hidden');
                    dom.userPlanText.textContent = "Free Plan";
                }
            }
        }

        // --- API Routing ---
        function getApiUrl(endpoint) {
            const isPremium = STATE.user && (STATE.user.plan === 'premium' || STATE.user.plan === 'lifetime');
            const baseUrl = isPremium ? window.__ENV__.PREMIUM_AI_URL : window.__ENV__.FREE_AI_URL;

            switch(endpoint) {
                case 'chat': return `${baseUrl}/ask/universal`;
                case 'stt': return `${baseUrl}/stt`;
                case 'tts': return `${baseUrl}/tts`;
                case 'regenerate': return `${baseUrl}/regenerate`;
                case 'new-chat': return `${baseUrl}/new-chat`;
                case 'stop': return `${baseUrl}/stop`;
                default: return `${baseUrl}/${endpoint}`;
            }
        }

        // --- Core Chat Functions ---

        // 1. Send Message (SSE Streaming)
        async function sendMessage(overrideText = null) {
            const text = overrideText || dom.input.value.trim();
            if (!text || STATE.streaming) return;

            if (overrideText && STATE.editingMsgId) {
                const idx = STATE.messages.findIndex(m => m.id === STATE.editingMsgId);
                if (idx !== -1) {
                    STATE.messages[idx].content = text;
                    STATE.messages = STATE.messages.slice(0, idx + 1);
                }
                STATE.editingMsgId = null;
            } else {
                STATE.messages.push({ id: Date.now(), role: 'user', content: text });
            }

            const aiMsg = { id: Date.now() + 1, role: 'assistant', content: '' };
            STATE.messages.push(aiMsg);
            
            dom.input.value = '';
            dom.input.dispatchEvent(new Event('input'));
            renderMessages();
            
            if (STATE.messages.length === 2) addChatToSidebar(text.substring(0, 30) + "...", STATE.currentChatId);
            
            STATE.streaming = true;
            updateUIState();
            STATE.controller = new AbortController();

            try {
                const response = await fetch(getApiUrl('chat'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        history: STATE.messages.slice(0, -1),
                        chatId: STATE.currentChatId
                    }),
                    signal: STATE.controller.signal
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const jsonStr = line.replace('data: ', '');
                            if (jsonStr === '[DONE]') continue;
                            try {
                                const data = JSON.parse(jsonStr);
                                if (data.content) {
                                    aiMsg.content += data.content;
                                    renderMessages();
                                }
                            } catch (e) { }
                        }
                    }
                }
            } catch (err) {
                if (err.name !== 'AbortError') {
                    aiMsg.content = "**Error:** Connection failed.";
                    renderMessages();
                }
            } finally {
                STATE.streaming = false;
                updateUIState();
            }
        }

        // 2. Stop Stream
        function stopStream() {
            if (STATE.controller) STATE.controller.abort();
            fetch(getApiUrl('stop'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatId: STATE.currentChatId })
            }).catch(() => {});
            showToast("Stopped");
            STATE.streaming = false;
            updateUIState();
        }

        // 3. New Chat
        async function createNewChat() {
            STATE.currentChatId = Date.now();
            STATE.messages = [];
            renderMessages();
            showToast("Creating new chat...");
            try {
                await fetch(getApiUrl('new-chat'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: STATE.currentChatId, userId: STATE.user?.id })
                });
                showToast("New chat started");
            } catch (e) {
                showToast("New chat started (local)");
            }
        }

        // 4. Regenerate
        async function regenerateMsg(id) {
            const idx = STATE.messages.findIndex(m => m.id == id);
            if (idx > 0) {
                STATE.messages = STATE.messages.slice(0, idx);
                const lastUserMsg = STATE.messages[STATE.messages.length - 1];
                
                if (lastUserMsg && lastUserMsg.role === 'user') {
                    STATE.messages.pop();
                    const aiMsg = { id: Date.now() + 1, role: 'assistant', content: '' };
                    STATE.messages.push(aiMsg);
                    renderMessages();
                    
                    STATE.streaming = true;
                    updateUIState();
                    STATE.controller = new AbortController();

                    try {
                        const res = await fetch(getApiUrl('regenerate'), {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ chatId: STATE.currentChatId, lastMessage: lastUserMsg.content }),
                            signal: STATE.controller.signal
                        });
                        
                        const reader = res.body.getReader();
                        const decoder = new TextDecoder();
                        let buffer = '';

                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            buffer += decoder.decode(value, { stream: true });
                            const lines = buffer.split('\n');
                            buffer = lines.pop();
                            
                            for (const line of lines) {
                                if (line.startsWith('data: ')) {
                                    const jsonStr = line.replace('data: ', '');
                                    if (jsonStr === '[DONE]') continue;
                                    try {
                                        const data = JSON.parse(jsonStr);
                                        if (data.content) {
                                            aiMsg.content += data.content;
                                            renderMessages();
                                        }
                                    } catch (e) {}
                                }
                            }
                        }
                    } catch (err) {
                        if (err.name !== 'AbortError') {
                            aiMsg.content = "**Error:** Regeneration failed.";
                            renderMessages();
                        }
                    } finally {
                        STATE.streaming = false;
                        updateUIState();
                    }
                }
            }
        }

        // --- Voice Functions ---

        // 5. STT
        function initVoiceListeners() {
            dom.micBtn.addEventListener('mousedown', startRecording);
            dom.micBtn.addEventListener('mouseup', stopRecording);
            dom.micBtn.addEventListener('mouseleave', stopRecording);
            dom.micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
            dom.micBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });
        }

        async function startRecording() {
            if (STATE.streaming || STATE.isRecording) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                STATE.mediaRecorder = new MediaRecorder(stream);
                STATE.audioChunks = [];

                STATE.mediaRecorder.ondataavailable = (event) => { STATE.audioChunks.push(event.data); };
                STATE.mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(track => track.stop());
                    const audioBlob = new Blob(STATE.audioChunks, { type: 'audio/webm' });
                    await sendAudioToBackend(audioBlob);
                };

                STATE.mediaRecorder.start();
                STATE.isRecording = true;
                dom.voiceIndicator.classList.remove('hidden');
                dom.voiceIndicator.classList.add('flex');
                dom.micBtn.classList.add('recording-pulse', 'bg-red-500/20');
            } catch (err) {
                showToast("Mic access denied");
            }
        }

        function stopRecording() {
            if (STATE.mediaRecorder && STATE.isRecording && STATE.mediaRecorder.state !== 'inactive') {
                STATE.mediaRecorder.stop();
                STATE.isRecording = false;
                dom.voiceIndicator.classList.add('hidden');
                dom.voiceIndicator.classList.remove('flex');
                dom.micBtn.classList.remove('recording-pulse', 'bg-red-500/20');
            }
        }

        async function sendAudioToBackend(blob) {
            showToast("Transcribing...");
            const formData = new FormData();
            formData.append('audio', blob, 'recording.webm');
            formData.append('chatId', STATE.currentChatId);
            try {
                const response = await fetch(getApiUrl('stt'), { method: 'POST', body: formData });
                if (response.ok) {
                    const data = await response.json();
                    if (data.text) {
                        dom.input.value = data.text;
                        dom.input.dispatchEvent(new Event('input'));
                        showToast("Transcribed!");
                    }
                } else { showToast("Transcription failed"); }
            } catch (error) { showToast("STT connection error"); }
        }

        // 6. TTS
        async function playVoiceReply(id) {
            const m = STATE.messages.find(m => m.id == id);
            if (!m) return;
            showToast("Generating audio...");
            try {
                const r = await fetch(getApiUrl('tts'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: m.content, chatId: STATE.currentChatId })
                });

                if (r.ok) {
                    const blob = await r.blob();
                    const audioUrl = URL.createObjectURL(blob);
                    const audio = new Audio(audioUrl);
                    audio.play();
                    showToast("Playing audio...");
                } else {
                    showToast("TTS Service Error: " + r.status);
                }
            } catch (error) {
                showToast("TTS Connection Failed");
            }
        }

        // --- Rendering ---
        function renderMessages() {
            if (STATE.messages.length === 0) {
                dom.welcome.classList.remove('hidden');
                dom.messages.classList.add('hidden');
                return;
            }
            dom.welcome.classList.add('hidden');
            dom.messages.classList.remove('hidden');

            dom.messages.innerHTML = STATE.messages.map(msg => {
                const isUser = msg.role === 'user';
                const content = isUser ? escapeHtml(msg.content) : parseAndRender(msg.content);

                const userMenu = `
                    <div class="msg-actions absolute -bottom-5 right-0 flex gap-0.5 bg-[var(--bg-primary)] rounded-md p-0.5 shadow-sm border border-[var(--border)]">
                        <button onclick="openEditModal(${msg.id})" class="msg-btn" title="Edit">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                        </button>
                        <button onclick="copyText('${msg.id}')" class="msg-btn" title="Copy">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                        </button>
                    </div>`;

                const aiMenu = `
                    <div class="msg-actions flex items-center gap-0.5 mt-1">
                        <button onclick="handleFeedback('${msg.id}', 'like')" class="msg-btn" title="Like">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5"/></svg>
                        </button>
                        <button onclick="handleFeedback('${msg.id}', 'dislike')" class="msg-btn" title="Dislike">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14H5.236a2 2 0 01-1.789-2.894l3.5-7A2 2 0 018.736 3h4.018a2 2 0 01.485.06l3.76.94m-7 10v5a2 2 0 002 2h.096c.5 0 .905-.405.905-.904 0-.715.211-1.413.608-2.008L17 13V4m-7 10h2m5-10h2a2 2 0 012 2v6a2 2 0 01-2 2h-2.5"/></svg>
                        </button>
                        <button onclick="copyText('${msg.id}')" class="msg-btn" title="Copy">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                        </button>
                        <button onclick="playVoiceReply('${msg.id}')" class="msg-btn" title="Read Aloud">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15.536a5 5 0 001.414 1.414m2.828-9.9a9 9 0 0112.728 0"/></svg>
                        </button>
                        <button onclick="regenerateMsg('${msg.id}')" class="msg-btn" title="Regenerate">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        </button>
                    </div>`;

                const actions = isUser ? userMenu : aiMenu;

                if (isUser) {
                    return `<div class="flex justify-end fade-in msg-container">
                        <div class="max-w-lg rounded-2xl px-4 py-2 text-white relative group" style="background: var(--accent);">${content}${actions}</div>
                    </div>`;
                } else {
                    return `<div class="flex gap-3 fade-in msg-container">
                        <div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-white font-bold text-xs" style="background: linear-gradient(135deg, var(--accent), #3b82f6);">H</div>
                        <div class="flex-1 prose max-w-none relative">
                            ${msg.content ? content : '<div class="typing-indicator"><span></span><span></span><span></span></div>'}
                            ${msg.content ? actions : ''}
                        </div>
                    </div>`;
                }
            }).join('');

            document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
        }

        function parseAndRender(text) {
            const clean = DOMPurify.sanitize(text);
            const renderer = new marked.Renderer();
            renderer.code = (code, lang) => {
                const hl = hljs.highlight(code, { language: lang || 'plaintext' }).value;
                return `<div class="code-block-wrapper">
                    <div class="code-header">
                        <span>${lang || 'code'}</span>
                        <button onclick="copyCode(this)" class="text-xs opacity-60 hover:opacity-100">Copy</button>
                    </div>
                    <pre><code class="hljs">${hl}</code></pre>
                </div>`;
            };
            marked.setOptions({ renderer, breaks: true });
            return marked.parse(clean);
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function copyCode(btn) {
            navigator.clipboard.writeText(btn.closest('.code-block-wrapper').querySelector('code').innerText);
            btn.textContent = "Copied!";
            setTimeout(() => btn.textContent = "Copy", 2000);
        }

        // --- UI Utilities ---
        function updateUIState() {
            const hasText = dom.input.value.length > 0;
            if (STATE.streaming) {
                dom.micBtn.classList.add('hidden');
                dom.sendBtn.classList.add('hidden');
                dom.stopBtn.classList.remove('hidden');
            } else {
                dom.stopBtn.classList.add('hidden');
                if (hasText) {
                    dom.sendBtn.classList.remove('hidden');
                    dom.micBtn.classList.add('hidden');
                } else {
                    dom.sendBtn.classList.add('hidden');
                    dom.micBtn.classList.remove('hidden');
                }
            }
        }

        dom.input.addEventListener('input', () => {
            dom.input.style.height = 'auto';
            dom.input.style.height = dom.input.scrollHeight + 'px';
            updateUIState();
        });
        
        dom.input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function setTheme(t) {
            document.body.setAttribute('data-theme', t);
            localStorage.setItem('theme', t);
            dom.themeSelector.value = t;
        }

        const showToast = (msg) => {
            dom.toastMsg.textContent = msg;
            dom.toast.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => dom.toast.classList.add('opacity-0', 'translate-y-4'), 2500);
        };

        function toggleSidebar() {
            dom.sidebar.classList.toggle('-translate-x-full');
            dom.overlay.classList.toggle('hidden');
        }

        function toggleActionSheet() {
            const v = !dom.actionSheet.classList.contains('hidden');
            if (v) {
                dom.actionSheet.classList.add('hidden');
                dom.actionSheetContent.style.transform = 'translateY(100%)';
            } else {
                dom.actionSheet.classList.remove('hidden');
                setTimeout(() => dom.actionSheetContent.style.transform = 'translateY(0)', 10);
            }
        }

        function handleAction(t) {
            toggleActionSheet();
            if (t === 'code') setInput('Generate code for: ');
            if (t === 'search') setInput('Search web for: ');
            if (t === 'upload') dom.fileInput.click();
        }

        function setInput(t) {
            dom.input.value = t;
            dom.input.focus();
            dom.input.dispatchEvent(new Event('input'));
        }

        // --- Minor Actions ---
        function addChatToSidebar(title, id) {
            const i = document.createElement('button');
            i.className = "w-full text-left px-3 py-2 rounded-lg truncate text-xs hover:bg-tertiary transition-colors";
            i.style.color = "var(--fg-secondary)";
            i.textContent = title;
            i.onclick = () => loadChat(id);
            if (dom.chatHistory.querySelector('.opacity-40')) dom.chatHistory.innerHTML = '';
            dom.chatHistory.prepend(i);
        }

        function loadChat(id) {
            STATE.currentChatId = id;
            toggleSidebar();
        }

        function openEditModal(id) {
            const m = STATE.messages.find(m => m.id === id);
            if (!m) return;
            STATE.editingMsgId = id;
            dom.editInput.value = m.content;
            dom.editModal.classList.remove('hidden');
        }

        function closeEditModal() {
            dom.editModal.classList.add('hidden');
            STATE.editingMsgId = null;
        }

        function saveEdit() {
            const n = dom.editInput.value.trim();
            if (!n) return;
            closeEditModal();
            sendMessage(n);
        }

        function copyText(id) {
            navigator.clipboard.writeText(STATE.messages.find(m => m.id == id)?.content || '');
            showToast("Copied");
        }

        function handleFeedback(id, t) {
            showToast(`Feedback: ${t}`);
        }

        function handleFile(e) {
            showToast("Uploading...");
        }

        function handleAuth() {
            showToast("Auth triggered");
        }

        // Initialize
        init();

    </script>
</body>
</html>
