<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeloxAi — Admin Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Cloudflare Turnstile (explicit render, onload callback) -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit&onload=onTurnstileLoad" async defer></script>

<style>
:root {
  --bg-deep: #050810;
  --bg: #0a0e17;
  --card: rgba(10, 14, 23, 0.85);
  --card-border: rgba(0, 255, 136, 0.12);
  --input-bg: rgba(5, 8, 16, 0.9);
  --input-border: rgba(255, 255, 255, 0.06);
  --input-border-focus: rgba(0, 255, 136, 0.4);
  --accent: #00ff88;
  --accent-dim: rgba(0, 255, 136, 0.15);
  --accent-glow: rgba(0, 255, 136, 0.25);
  --danger: #ff4757;
  --danger-dim: rgba(255, 71, 87, 0.12);
  --warning: #ffa502;
  --muted: #4a5568;
  --text: #c8d6e5;
  --text-dim: #636e7f;
  --text-bright: #ecf0f1;
  --radius: 14px;
  --radius-sm: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Space Grotesk', system-ui, sans-serif;
  background: var(--bg-deep);
  color: var(--text);
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.scanlines {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 255, 136, 0.008) 2px,
    rgba(0, 255, 136, 0.008) 4px
  );
}

.scan-beam {
  position: fixed;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--accent-glow) 50%, transparent 100%);
  z-index: 1;
  pointer-events: none;
  animation: scanBeam 8s linear infinite;
  opacity: 0.5;
}

@keyframes scanBeam {
  0% { top: -2px; }
  100% { top: 100%; }
}

.login-wrapper {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  max-width: 440px;
  padding: 20px;
}

.status-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 18px;
  background: rgba(0, 255, 136, 0.04);
  border: 1px solid rgba(0, 255, 136, 0.08);
  border-radius: 100px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  animation: fadeSlideDown 0.6s ease-out both;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
  animation: pulse 2s ease-in-out infinite;
  flex-shrink: 0;
}

.status-dot.warn { background: var(--warning); box-shadow: 0 0 8px rgba(255, 165, 2, 0.3); }
.status-dot.off { background: var(--muted); box-shadow: none; animation: none; }

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}

.login-card {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 36px 32px 28px;
  backdrop-filter: blur(40px) saturate(1.3);
  box-shadow:
    0 0 0 1px rgba(0, 255, 136, 0.03),
    0 4px 24px rgba(0, 0, 0, 0.5),
    0 20px 60px rgba(0, 0, 0, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.03);
  position: relative;
  overflow: hidden;
  animation: fadeSlideUp 0.7s ease-out both;
}

.login-card::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 20%;
  right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.5;
}

.login-card::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--accent) 15%,
    var(--accent) 85%,
    transparent 100%
  );
  opacity: 0;
  animation: borderGlow 4s ease-in-out infinite;
  border-radius: var(--radius) var(--radius) 0 0;
}

@keyframes borderGlow {
  0%, 100% { opacity: 0; }
  50% { opacity: 0.6; }
}

.card-header {
  text-align: center;
  margin-bottom: 28px;
}

.shield-icon {
  width: 56px;
  height: 56px;
  margin: 0 auto 16px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.shield-icon svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 12px var(--accent-glow));
}

.shield-ring {
  position: absolute;
  inset: -6px;
  border: 1px solid rgba(0, 255, 136, 0.15);
  border-radius: 50%;
  animation: ringPulse 3s ease-in-out infinite;
}

.shield-ring:nth-child(2) {
  inset: -14px;
  border-color: rgba(0, 255, 136, 0.07);
  animation-delay: 0.5s;
}

@keyframes ringPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.08); opacity: 0.4; }
}

.card-header h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -0.3px;
  margin-bottom: 4px;
}

.card-header p {
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 400;
}

.security-badges {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 24px;
}

.badge {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.badge i { font-size: 10px; }

.badge.ssl {
  background: rgba(0, 255, 136, 0.06);
  color: var(--accent);
  border: 1px solid rgba(0, 255, 136, 0.1);
}

.badge.turnstile {
  background: rgba(246, 171, 54, 0.06);
  color: #f6ab36;
  border: 1px solid rgba(246, 171, 54, 0.1);
}

.badge.enc {
  background: rgba(237, 187, 99, 0.06);
  color: #edbb63;
  border: 1px solid rgba(237, 187, 99, 0.1);
}

/* ── Turnstile Widget Container ── */
#turnstile-container {
  display: flex;
  justify-content: center;
  margin-bottom: 16px;
  min-height: 0;
  transition: margin 0.3s, min-height 0.3s;
}

#turnstile-container.has-widget {
  margin-bottom: 20px;
  min-height: 65px;
}

/* Override Turnstile default styles to match theme */
#turnstile-container .cf-turnstile {
  border-radius: 8px;
  overflow: hidden;
}

#turnstile-container iframe {
  border-radius: 8px !important;
}

.form-group {
  margin-bottom: 16px;
  position: relative;
}

.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-dim);
  margin-bottom: 7px;
}

.input-wrap {
  position: relative;
}

.input-wrap i.field-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--muted);
  transition: color 0.3s;
  pointer-events: none;
}

.input-wrap input {
  width: 100%;
  padding: 13px 14px 13px 42px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--input-border);
  background: var(--input-bg);
  color: var(--text-bright);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  outline: none;
  transition: all 0.3s ease;
}

.input-wrap input::placeholder {
  color: var(--muted);
  font-weight: 300;
}

.input-wrap input:focus {
  border-color: var(--input-border-focus);
  box-shadow: 0 0 0 3px var(--accent-dim), 0 0 20px rgba(0, 255, 136, 0.05);
}

.input-wrap input:focus ~ i.field-icon {
  color: var(--accent);
}

.input-wrap input.error {
  border-color: rgba(255, 71, 87, 0.4);
  box-shadow: 0 0 0 3px var(--danger-dim);
}

.input-wrap input.error ~ i.field-icon {
  color: var(--danger);
}

.toggle-password {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 4px;
  font-size: 14px;
  transition: color 0.2s;
  display: flex;
  align-items: center;
}

.toggle-password:hover { color: var(--text); }

.form-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 22px;
  font-size: 12px;
}

.remember-me {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  color: var(--text-dim);
  user-select: none;
}

.remember-me input[type="checkbox"] { display: none; }

.checkmark {
  width: 16px;
  height: 16px;
  border-radius: 4px;
  border: 1px solid var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.checkmark i {
  font-size: 9px;
  color: var(--bg-deep);
  opacity: 0;
  transform: scale(0.5);
  transition: all 0.2s;
}

.remember-me input:checked + .checkmark {
  background: var(--accent);
  border-color: var(--accent);
}

.remember-me input:checked + .checkmark i {
  opacity: 1;
  transform: scale(1);
}

.forgot-link {
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.2s;
}

.forgot-link:hover { color: var(--accent); }

.submit-btn {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius-sm);
  border: none;
  background: linear-gradient(135deg, #00cc6a, #00ff88);
  color: var(--bg-deep);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.3px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}

.submit-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.5s;
}

.submit-btn:hover::before { transform: translateX(100%); }

.submit-btn:hover {
  box-shadow: 0 4px 20px rgba(0, 255, 136, 0.3), 0 0 40px rgba(0, 255, 136, 0.1);
  transform: translateY(-1px);
}

.submit-btn:active {
  transform: translateY(0) scale(0.98);
}

.submit-btn.loading {
  pointer-events: none;
  opacity: 0.8;
}

.submit-btn .btn-text { position: relative; z-index: 1; }

.submit-btn .spinner {
  display: none;
  position: relative;
  z-index: 1;
}

.submit-btn.loading .btn-text { display: none; }
.submit-btn.loading .spinner { display: inline-flex; align-items: center; gap: 8px; }

.spinner-dots {
  display: flex;
  gap: 4px;
}

.spinner-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--bg-deep);
  animation: dotBounce 1.2s ease-in-out infinite;
}

.spinner-dots span:nth-child(2) { animation-delay: 0.15s; }
.spinner-dots span:nth-child(3) { animation-delay: 0.3s; }

@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

#message {
  text-align: center;
  min-height: 20px;
  font-size: 12px;
  font-weight: 500;
  margin-top: 14px;
  transition: all 0.3s;
  font-family: 'JetBrains Mono', monospace;
}

#message.error { color: var(--danger); }
#message.success { color: var(--accent); }
#message.pending { color: var(--text-dim); }

.card-footer {
  text-align: center;
  padding-top: 18px;
  border-top: 1px solid rgba(255,255,255,0.04);
  font-size: 11px;
  color: var(--text-dim);
}

.card-footer a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
  transition: opacity 0.2s;
}

.card-footer a:hover { opacity: 0.8; }

.bottom-info {
  display: flex;
  gap: 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  animation: fadeSlideUp 0.8s ease-out 0.3s both;
}

.bottom-info span {
  display: flex;
  align-items: center;
  gap: 5px;
}

@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

.shake { animation: shake 0.4s ease-out; }

.toast-container {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.toast {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  border-radius: 10px;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  animation: toastIn 0.4s ease-out both;
  min-width: 260px;
}

.toast.error {
  background: rgba(255, 71, 87, 0.12);
  border: 1px solid rgba(255, 71, 87, 0.2);
  color: #ff6b7a;
}

.toast.success {
  background: rgba(0, 255, 136, 0.08);
  border: 1px solid rgba(0, 255, 136, 0.15);
  color: var(--accent);
}

.toast.removing { animation: toastOut 0.3s ease-in both; }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(40px) scale(0.95); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}

@keyframes toastOut {
  to { opacity: 0; transform: translateX(40px) scale(0.95); }
}

@media (max-width: 480px) {
  .login-card { padding: 28px 20px 22px; }
  .security-badges { gap: 6px; }
  .badge { padding: 4px 7px; font-size: 9px; }
  .bottom-info { gap: 14px; font-size: 9px; }
  .status-bar { font-size: 10px; gap: 10px; padding: 8px 14px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
  .scan-beam, .scanlines { display: none; }
}
</style>
</head>

<script>
/* ── Turnstile State ── */
let turnstileToken = null;
let turnstileWidgetId = null;
let turnstileReady = false;

/**
 * Called automatically by the Turnstile script once loaded.
 * Uses explicit render mode so we control placement and callbacks.
 */
function onTurnstileLoad() {
  if (!window.__ENV__ || !window.__ENV__.TURNSTILE_SITE_KEY) {
    console.warn('Turnstile site key not found in env.js — expected TURNSTILE_SITE_KEY');
    const sysDot = document.getElementById('sys-status');
    const sysText = document.getElementById('sys-status-text');
    sysDot.className = 'status-dot warn';
    sysText.textContent = 'Turnstile Unconfigured';
    return;
  }

  turnstileWidgetId = window.turnstile.render('#turnstile-container', {
    sitekey: window.__ENV__.TURNSTILE_SITE_KEY,
    callback: function(token) {
      turnstileToken = token;
      turnstileReady = true;
    },
    'error-callback': function() {
      turnstileToken = null;
      turnstileReady = false;
    },
    'expired-callback': function() {
      turnstileToken = null;
      // Auto-reset so a fresh token is available on next submit
      if (turnstileWidgetId !== null) {
        window.turnstile.reset(turnstileWidgetId);
      }
    },
    /* Only show the visible widget when Cloudflare decides a challenge is needed */
    appearance: 'interaction-only',
    size: 'normal',
    theme: 'dark',
  });
}

/* ── Animated Grid Background ── */
(function initBackground() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let w, h, particles = [], mouse = { x: -1000, y: -1000 };

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  document.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });

  const PARTICLE_COUNT = Math.min(80, Math.floor((w * h) / 18000));
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.5 + 0.5,
      alpha: Math.random() * 0.4 + 0.1,
    });
  }

  function drawGrid() {
    const spacing = 60;
    ctx.strokeStyle = 'rgba(0, 255, 136, 0.018)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x < w; x += spacing) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, h);
      ctx.stroke();
    }
    for (let y = 0; y < h; y += spacing) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }
  }

  function animate() {
    ctx.clearRect(0, 0, w, h);

    const grad = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, Math.max(w, h) * 0.7);
    grad.addColorStop(0, 'rgba(0, 255, 136, 0.02)');
    grad.addColorStop(0.5, 'rgba(0, 100, 60, 0.01)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    drawGrid();

    const mGrad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 200);
    mGrad.addColorStop(0, 'rgba(0, 255, 136, 0.04)');
    mGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = mGrad;
    ctx.fillRect(0, 0, w, h);

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;

      if (p.x < 0) p.x = w;
      if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h;
      if (p.y > h) p.y = 0;

      const dx = p.x - mouse.x;
      const dy = p.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 150) {
        const force = (150 - dist) / 150 * 0.02;
        p.vx += dx * force * 0.1;
        p.vy += dy * force * 0.1;
      }

      p.vx *= 0.99;
      p.vy *= 0.99;

      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.1, p.r), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0, 255, 136, ${p.alpha})`;
      ctx.fill();

      for (let j = i + 1; j < particles.length; j++) {
        const p2 = particles[j];
        const d = Math.hypot(p.x - p2.x, p.y - p2.y);
        if (d < 120) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.strokeStyle = `rgba(0, 255, 136, ${0.06 * (1 - d / 120)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(animate);
  }
  animate();
})();

/* ── Live Clock ── */
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    [now.getHours(), now.getMinutes(), now.getSeconds()]
      .map(n => String(n).padStart(2, '0')).join(':') + ' UTC';
}
updateClock();
setInterval(updateClock, 1000);

/* ── Attempt Counter ── */
let attemptCount = 0;
const attemptSpan = document.querySelector('.bottom-info span:last-child');

/* ── IP Detection ── */
(async function detectIP() {
  try {
    const res = await fetch('https://api.ipify.org?format=json');
    const data = await res.json();
    const ip = data.ip || 'Unknown';
    const masked = ip.split('.').slice(0, 2).join('.') + '.***';
    document.getElementById('ip-display').innerHTML = `<i class="fa-solid fa-globe"></i> ${masked}`;
  } catch {
    document.getElementById('ip-display').innerHTML = `<i class="fa-solid fa-globe"></i> Hidden`;
  }
})();

/* ── Toast System ── */
function showToast(message, type) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  const icon = type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check';
  toast.innerHTML = `<i class="fa-solid ${icon}"></i><span>${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('removing');
    setTimeout(() => toast.remove(), 300);
  }, 4000);
}

/* ── Password Toggle ── */
const passwordInput = document.getElementById('password');
const toggleBtn = document.getElementById('toggle-password');
toggleBtn.addEventListener('click', () => {
  const isPassword = passwordInput.type === 'password';
  passwordInput.type = isPassword ? 'text' : 'password';
  toggleBtn.querySelector('i').className = isPassword
    ? 'fa-solid fa-eye-slash'
    : 'fa-solid fa-eye';
});

/* ── Clear error state on input ── */
document.getElementById('email').addEventListener('input', function() {
  this.classList.remove('error');
});
passwordInput.addEventListener('input', function() {
  this.classList.remove('error');
});

/* ── Auth Logic ── */
const form = document.getElementById('admin-login-form');
const emailInput = document.getElementById('email');
const messageEl = document.getElementById('message');
const submitBtn = document.getElementById('submit-btn');
const loginCard = document.getElementById('login-card');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  messageEl.textContent = '';
  messageEl.className = '';

  const email = emailInput.value.trim().toLowerCase();
  const password = passwordInput.value;

  /* Domain validation */
  if (!email.endsWith('@heloxai.xyz')) {
    emailInput.classList.add('error');
    loginCard.classList.add('shake');
    setTimeout(() => loginCard.classList.remove('shake'), 400);
    messageEl.textContent = 'Access restricted to @heloxai.xyz domains';
    messageEl.className = 'error';
    showToast('Unauthorized domain — admin access required', 'error');
    attemptCount++;
    attemptSpan.innerHTML = `<i class="fa-solid fa-clock-rotate-left"></i> ${attemptCount} attempt${attemptCount > 1 ? 's' : ''}`;
    return;
  }

  if (!password) {
    passwordInput.classList.add('error');
    loginCard.classList.add('shake');
    setTimeout(() => loginCard.classList.remove('shake'), 400);
    messageEl.textContent = 'Password is required';
    messageEl.className = 'error';
    return;
  }

  /* Turnstile check */
  if (!turnstileToken) {
    if (!turnstileReady && turnstileWidgetId === null) {
      messageEl.textContent = 'Bot protection is still loading — please wait';
      messageEl.className = 'pending';
      return;
    }
    messageEl.textContent = 'Waiting for browser verification...';
    messageEl.className = 'pending';
    return;
  }

  /* Grab token and reset widget for next attempt */
  const cfToken = turnstileToken;
  turnstileToken = null;
  if (turnstileWidgetId !== null) {
    window.turnstile.reset(turnstileWidgetId);
  }

  submitBtn.classList.add('loading');

  try {
    const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.__ENV__;

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
      throw new Error('MISSING_CONFIG');
    }

    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error || !data?.user) {
      throw new Error('INVALID_CREDENTIALS');
    }

    const { data: profile, error: profileError } = await supabase
      .from('users')
      .select('role')
      .eq('id', data.user.id)
      .single();

    if (profileError || profile?.role !== 'admin') {
      await supabase.auth.signOut();
      throw new Error('ACCESS_DENIED');
    }

    /* Success */
    messageEl.textContent = 'Authentication successful — redirecting...';
    messageEl.className = 'success';
    showToast('Identity verified — loading console', 'success');

    loginCard.style.borderColor = 'rgba(0, 255, 136, 0.4)';
    loginCard.style.boxShadow = '0 0 40px rgba(0, 255, 136, 0.15)';

    setTimeout(() => { location.href = 'admin-dashboard.html'; }, 1200);

  } catch (err) {
    console.error(err);
    submitBtn.classList.remove('loading');
    loginCard.classList.add('shake');
    setTimeout(() => loginCard.classList.remove('shake'), 400);

    attemptCount++;
    attemptSpan.innerHTML = `<i class="fa-solid fa-clock-rotate-left"></i> ${attemptCount} attempt${attemptCount > 1 ? 's' : ''}`;

    switch (err.message) {
      case 'INVALID_CREDENTIALS':
        emailInput.classList.add('error');
        passwordInput.classList.add('error');
        messageEl.textContent = 'Invalid credentials — check email and password';
        messageEl.className = 'error';
        showToast('Authentication failed — invalid credentials', 'error');
        break;
      case 'ACCESS_DENIED':
        messageEl.textContent = 'Insufficient privileges — admin role required';
        messageEl.className = 'error';
        showToast('Access denied — not an admin account', 'error');
        break;
      case 'MISSING_CONFIG':
        messageEl.textContent = 'System configuration error';
        messageEl.className = 'error';
        showToast('Server misconfigured — contact support', 'error');
        break;
      default:
        messageEl.textContent = 'An unexpected error occurred';
        messageEl.className = 'error';
        showToast('Connection error — check your network', 'error');
    }
  }
});
</script>
