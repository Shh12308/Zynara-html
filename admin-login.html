<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – Zynara</title>

<!-- reCAPTCHA v3 -->
<script src="https://www.google.com/recaptcha/api.js?render=6LcjZcIrAAAAAJLvrkikTdvpmy_ny-o5p19NvbPZ"></script>

<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #6ee7b7;
  --danger: #ff6b6b;
  --muted: #9aa4b2;
  --radius: 12px;
  font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
}

html, body {
  height: 100%;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(180deg, #071028 0%, #0f1724 100%);
  color: #e6eef6;
}

.admin-container {
  background: var(--card);
  border-radius: var(--radius);
  padding: 32px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 8px 40px rgba(2,6,23,0.75);
  display: flex;
  flex-direction: column;
  gap: 14px;
}

h1 {
  text-align: center;
  margin-bottom: 18px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: #071126;
  color: #e6eef6;
  font-size: 16px;
}

button {
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #ff3b3b, #ff6b6b);
  color: #fff;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  transform: scale(1.03);
}

#message {
  text-align: center;
  min-height: 1.4em;
}

.password-wrapper {
  position: relative;
}

.password-wrapper button {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
}
</style>
</head>

<body>

<div class="admin-container">
  <h1>Zynara Admin Login</h1>

  <form id="admin-login-form">
    <input type="email" id="email" placeholder="Email" required>
    
    <div class="password-wrapper">
      <input type="password" id="password" placeholder="Password" required>
      <button type="button" id="toggle-password">👁️</button>
    </div>

    <button type="submit">Login</button>
    <div id="message"></div>
  </form>

  <p style="text-align:center;color:#9aa4b2;">
    Contact <a href="mailto:support@zynara.xyz" style="color:#6ee7b7;">support@zynara.xyz</a>
  </p>
</div>

<script src="env.js"></script>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  if (!window.__ENV__) {
    throw new Error("env.js not loaded");
  }

  const {
    SUPABASE_URL,
    SUPABASE_ANON_KEY,
    RECAPTCHA_SITE_KEY
  } = window.__ENV__;

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById("admin-login-form");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const message = document.getElementById("message");
const toggle = document.getElementById("toggle-password");

toggle.onclick = () => {
  passwordInput.type = passwordInput.type === "password" ? "text" : "password";
};

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  message.textContent = "";
  message.style.color = "#ff6b6b";

  const email = emailInput.value.trim().toLowerCase();
  const password = passwordInput.value;

  if (!email.endsWith("@zynara.xyz")) {
    message.textContent = "Admins must use a @zynara.xyz email.";
    return;
  }

  try {
    const token = await grecaptcha.execute(RECAPTCHA_SITE_KEY, {
      action: "admin_login"
    });

    if (!token) {
      message.textContent = "Human verification failed.";
      return;
    }

    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error || !data?.user) {
      message.textContent = "Invalid credentials.";
      return;
    }

    const { data: profile } = await supabase
      .from("users")
      .select("role")
      .eq("id", data.user.id)
      .single();

    if (profile?.role !== "admin") {
      await supabase.auth.signOut();
      message.textContent = "Access denied.";
      return;
    }

    message.style.color = "#7ee787";
    message.textContent = "Login successful!";
    setTimeout(() => location.href = "admin-dashboard.html", 700);

  } catch (err) {
    console.error(err);
    message.textContent = "Unexpected error.";
  }
});
</script>

</body>
</html>
