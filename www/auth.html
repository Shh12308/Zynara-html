<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>HeloxAi – Social Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root {
      --bg: #0f1724;
      --bg-deep: #071028;
      --card-input: #071126;
      --accent: #6ee7b7;
      --accent2: #0ea5a5;
      --accent3: #4ade80;
      --muted: #9aa4b2;
      --fg: #e6eef6;
      --danger: #ff6b6b;
      --border: rgba(255,255,255,0.07);
      --border-light: rgba(255,255,255,0.03);
      --radius: 14px;
      --radius-sm: 10px;
      --font: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      --mono: 'IBM Plex Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: linear-gradient(180deg, var(--bg-deep) 0%, var(--bg) 100%);
      color: var(--fg);
      font-family: var(--font);
      font-size: 16px;
      overflow-x: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: clamp(12px, 4vw, 24px);
      overflow-y: auto;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 20% 20%, rgba(14,165,165,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 500px 500px at 80% 70%, rgba(110,231,183,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 300px 300px at 50% 50%, rgba(74,222,128,0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: bgShift 20s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      0% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 0.8; transform: scale(1.02); }
    }
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      pointer-events: none; z-index: 0;
      animation: orbFloat 18s ease-in-out infinite;
    }
    .orb-1 { width: 300px; height: 300px; background: rgba(14,165,165,0.08); top: -80px; left: -60px; }
    .orb-2 { width: 250px; height: 250px; background: rgba(110,231,183,0.06); bottom: -60px; right: -40px; animation-delay: -6s; animation-duration: 22s; }
    .orb-3 { width: 180px; height: 180px; background: rgba(74,222,128,0.05); top: 40%; right: 10%; animation-delay: -12s; animation-duration: 15s; }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.1); }
      66% { transform: translate(-20px, 15px) scale(0.95); }
    }

    .auth-container {
      position: relative; z-index: 1;
      width: 100%; max-width: min(420px, 90vw); margin: 40px 0;
    }
    .brand { text-align: center; margin-bottom: 24px; }
    .brand-logo {
      display: inline-flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--fg);
    }
    .brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #062022; font-weight: 700;
      box-shadow: 0 4px 20px rgba(14,165,165,0.3);
      animation: logoPulse 4s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(14,165,165,0.3); }
      50% { box-shadow: 0 4px 30px rgba(110,231,183,0.4); }
    }
    .brand-name { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .brand-name span {
      background: linear-gradient(90deg, var(--accent2), var(--accent3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .auth-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.008));
      border-radius: var(--radius);
      border: 1px solid var(--border-light);
      box-shadow: 0 8px 40px rgba(2,6,23,0.75), inset 0 1px 0 rgba(255,255,255,0.03);
      overflow: hidden; backdrop-filter: blur(10px);
      padding: clamp(24px, 5vw, 32px);
    }

    .panel-title {
      font-size: clamp(20px, 4vw, 24px); font-weight: 600;
      text-align: center; margin-bottom: 24px; letter-spacing: -0.3px;
    }

    .social-logins { display: grid; gap: 12px; margin-bottom: 24px; }
    .social-btn {
      display: flex; align-items: center; gap: 12px;
      width: 100%; padding: 14px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(8,20,36,0.85);
      color: var(--fg); font-family: var(--font);
      font-size: 15px; font-weight: 500; cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      -webkit-appearance: none; appearance: none; outline: none;
    }
    .social-btn:hover:not(:disabled) {
      background: rgba(14,165,165,0.08); border-color: rgba(14,165,165,0.25);
      transform: translateY(-1px); box-shadow: 0 4px 16px rgba(14,165,165,0.1);
    }
    .social-btn:active:not(:disabled) { transform: translateY(0); box-shadow: none; }
    .social-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    
    /* Provider specific hover colors */
    .social-btn[data-provider="wallet"]:hover:not(:disabled) {
      background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.25);
      box-shadow: 0 4px 16px rgba(245,158,11,0.08);
    }
    .social-btn[data-provider="github"]:hover:not(:disabled) {
      background: rgba(230,230,230,0.06); border-color: rgba(230,230,230,0.15);
    }
    .social-btn[data-provider="discord"]:hover:not(:disabled) {
      background: rgba(88,101,242,0.08); border-color: rgba(88,101,242,0.25);
      box-shadow: 0 4px 16px rgba(88,101,242,0.08);
    }
    .social-btn[data-provider="google"]:hover:not(:disabled) {
      background: rgba(234,67,53,0.07); border-color: rgba(234,67,53,0.2);
      box-shadow: 0 4px 16px rgba(234,67,53,0.06);
    }

    .social-btn .social-icon { width: 22px; height: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .social-btn .social-icon img { width: 22px; height: 22px; display: block; }
    .social-btn .btn-label { flex: 1; text-align: center; }
    .social-btn .btn-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.15); border-top-color: var(--fg);
      border-radius: 50%; animation: spin 0.6s linear infinite;
      flex-shrink: 0; display: none;
    }
    .social-btn.is-loading .btn-label { opacity: 0.5; }
    .social-btn.is-loading .btn-spinner { display: block; }
    .social-btn.is-loading { pointer-events: none; }
    .social-btn .disabled-badge {
      font-size: 10px; color: var(--muted); opacity: 0.7;
      font-weight: 400; flex-shrink: 0;
    }

    .msg-error { color: var(--danger); font-size: 13px; text-align: center; min-height: 20px; margin-top: 10px; }
    .msg-success { color: #7ee787; font-size: 13px; text-align: center; min-height: 20px; margin-top: 10px; }

    /* Admin Button Styling */
    .admin-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; margin-top: 20px; padding: 11px 0;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,107,107,0.15);
      background: rgba(255,107,107,0.04);
      color: rgba(255,107,107,0.7);
      font-family: var(--font); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
      -webkit-appearance: none; appearance: none; outline: none;
    }
    .admin-btn:hover { background: rgba(255,107,107,0.1); border-color: rgba(255,107,107,0.3); color: var(--danger); transform: translateY(-1px); }
    .admin-btn:active { transform: translateY(0); }

    .auth-footer {
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid var(--border-light);
      text-align: center; font-size: 13px; color: var(--muted); line-height: 1.6;
    }
    .auth-footer a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
    .auth-footer a:hover { color: var(--accent3); }

    .cookie-banner {
      position: fixed; bottom: 20px; left: 20px; right: 20px;
      background: rgba(15,23,42,0.95); color: #f1f5f9;
      padding: 18px 20px; border: 1px solid rgba(14,165,165,0.2);
      border-radius: 14px; display: none; z-index: 1000;
      font-family: var(--font); font-size: 13px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5); backdrop-filter: blur(16px);
    }
    .cookie-banner.visible { display: block; animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .cookie-banner p { margin: 0 0 14px 0; line-height: 1.5; }
    .cookie-banner a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    .cookie-actions { display: flex; gap: 10px; }
    .cookie-accept {
      background: linear-gradient(90deg, var(--accent2), var(--accent3));
      color: #062022; border: none; padding: 9px 20px; border-radius: 8px;
      cursor: pointer; font-weight: 600; font-family: var(--font); font-size: 13px;
      -webkit-appearance: none; appearance: none; outline: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .cookie-accept:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(14,165,165,0.3); }
    .cookie-accept:active { transform: translateY(0); }
    .cookie-decline {
      background: transparent; color: var(--muted);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 9px 20px; border-radius: 8px; cursor: pointer;
      font-family: var(--font); font-size: 13px;
      -webkit-appearance: none; appearance: none; outline: none;
      transition: all 0.15s;
    }
    .cookie-decline:hover { border-color: rgba(255,255,255,0.2); color: var(--fg); background: rgba(255,255,255,0.03); }

    @keyframes spin { to { transform: rotate(360deg); } }

    :focus-visible { outline: 2px solid var(--accent2); outline-offset: 2px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
    @media (max-width: 480px) {
      .auth-container { max-width: 100%; margin: 0; }
      .auth-card { border-radius: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; border: none; box-shadow: none; background: transparent; backdrop-filter: none; }
      .cookie-banner { left: 12px; right: 12px; bottom: 12px; }
    }
    @media (min-height: 750px) { body { align-items: center; } }
  </style>
</head>
<body>

  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>
  <div class="orb orb-3" aria-hidden="true"></div>

  <div class="auth-container" role="main">
    <div class="brand">
      <a href="index.html" class="brand-logo" aria-label="HeloxAi Home">
        <div class="brand-icon">H</div>
        <div class="brand-name">Helox<span>Ai</span></div>
      </a>
    </div>

    <div class="auth-card">
      <h2 class="panel-title">Welcome Back</h2>
      
      <div class="social-logins">
        <button class="social-btn" id="btn-google" type="button" data-provider="google">
          <span class="social-icon"><img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="" /></span>
          <span class="btn-label">Continue with Google</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
        
        <button class="social-btn" id="btn-wallet" type="button" data-provider="wallet">
          <span class="social-icon"><img src="https://www.svgrepo.com/show/331345/metamask.svg" alt="" /></span>
          <span class="btn-label">Continue with Wallet</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
        
        <button class="social-btn" id="btn-github" type="button" data-provider="github">
          <span class="social-icon"><img src="https://www.svgrepo.com/show/512317/github-142.svg" alt="" /></span>
          <span class="btn-label">Continue with GitHub</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
        
        <button class="social-btn" id="btn-discord" type="button" data-provider="discord">
          <span class="social-icon"><img src="https://www.svgrepo.com/show/353655/discord-icon.svg" alt="" /></span>
          <span class="btn-label">Continue with Discord</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
      </div>

      <div class="msg-error" id="auth-error" role="alert" aria-live="assertive"></div>
      <div class="msg-success" id="auth-success" role="status" aria-live="polite"></div>

      <!-- Admin Login Button -->
      <button class="admin-btn" id="admin-btn" type="button">
        <i class="fa-solid fa-shield-halved"></i>
        <span>Admin Login</span>
      </button>

      <div class="auth-footer">
        By continuing, you agree to our
        <a href="terms.html" target="_blank" rel="noopener">Terms</a> and
        <a href="priv.html" target="_blank" rel="noopener">Privacy Policy</a>.
      </div>
    </div>
  </div>

  <div class="cookie-banner" id="cookie-banner" role="dialog" aria-label="Cookie consent">
    <p><i class="fa-solid fa-cookie-bite" style="color:var(--accent2)"></i>&ensp;We use cookies and local storage to improve your experience. By continuing, you agree to our <a href="priv.html">Privacy Policy</a>.</p>
    <div class="cookie-actions">
      <button class="cookie-accept" id="cookie-accept">Accept</button>
      <button class="cookie-decline" id="cookie-decline">Decline</button>
    </div>
  </div>

  <!-- This script is required for the app to work. In a real scenario, ensure this file exists. -->
  <script src="env.js"></script>

  <script type="module">
    /* ═══════════════════════════════════
       Cookie consent
       ═══════════════════════════════════ */
    const cBanner = document.getElementById('cookie-banner');
    if (!localStorage.getItem('heloxai_cookie_consent')) cBanner.classList.add('visible');
    document.getElementById('cookie-accept').addEventListener('click', () => {
      localStorage.setItem('heloxai_cookie_consent', 'accepted');
      cBanner.classList.remove('visible');
    });
    document.getElementById('cookie-decline').addEventListener('click', () => {
      localStorage.setItem('heloxai_cookie_consent', 'declined');
      cBanner.classList.remove('visible');
    });

    /* ═══════════════════════════════════
       Admin Redirect
       ═══════════════════════════════════ */
    document.getElementById('admin-btn').addEventListener('click', () => {
      window.location.href = 'admin-login.html';
    });

    /* ═══════════════════════════════════
       Shared helpers
       ═══════════════════════════════════ */
    function setSocialLoading(btn, on) {
      if (on) {
        btn.classList.add('is-loading');
        btn.disabled = true;
      } else {
        btn.classList.remove('is-loading');
        if (!btn.dataset.alwaysDisabled) btn.disabled = false;
      }
    }

    function showMsg(type, text) {
      const el = document.getElementById('auth-' + type);
      if (el) el.textContent = text;
      // Clear opposite message
      const other = document.getElementById('auth-' + (type === 'error' ? 'success' : 'error'));
      if (other) other.textContent = '';
    }

    /* ═══════════════════════════════════
       Supabase — graceful init
       ═══════════════════════════════════ */
    const ENV = window.__ENV__;
    let sb = null;

    if (ENV && ENV.SUPABASE_URL && ENV.SUPABASE_ANON_KEY) {
      try {
        const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
        sb = createClient(ENV.SUPABASE_URL, ENV.SUPABASE_ANON_KEY);
      } catch (err) {
        console.error('Supabase init failed:', err);
      }
    }

    if (!sb) {
      document.querySelectorAll('.social-btn').forEach(btn => {
        btn.disabled = true;
        btn.dataset.alwaysDisabled = '1';
        if (!btn.querySelector('.disabled-badge')) {
          const b = document.createElement('span');
          b.className = 'disabled-badge';
          b.textContent = 'Offline';
          btn.appendChild(b);
        }
      });
      showMsg('error', 'Service is currently unavailable.');
    }

    /* ═══════════════════════════════════
       OAUTH helper
       ═══════════════════════════════════ */
    function handleOAuth(provider, btnId) {
  document.getElementById(btnId).addEventListener('click', async function () {
    if (!sb) return;

    showMsg('error', '');
    setSocialLoading(this, true);

    try {
      const { error } = await sb.auth.signInWithOAuth({
        provider,
        options: {
          redirectTo: window.location.origin + '/callback.html',
          skipBrowserRedirect: false
        }
      });

      if (error) throw error;

    } catch (err) {
      showMsg('error', err.message || `${provider} login failed.`);
      setSocialLoading(this, false);
    }
  });
}

    handleOAuth('google',  'btn-google');
    handleOAuth('github',  'btn-github');
    handleOAuth('discord', 'btn-discord');

    /* ═══════════════════════════════════
       Wallet — Login
       ═══════════════════════════════════ */
    document.getElementById('btn-wallet').addEventListener('click', async function () {
  showMsg('error', '');
  setSocialLoading(this, true);

  try {
    if (!window.ethereum) {
      throw new Error('Install MetaMask to continue.');
    }

    const provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    const signer = await provider.getSigner();
    const address = await signer.getAddress();

    // You must implement your own backend auth OR use SIWE
    const message = `Login to HeloxAi: ${address}`;

    const signature = await signer.signMessage(message);

    // Send to YOUR backend OR Supabase Edge Function
    const res = await fetch('/api/wallet-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ address, message, signature })
    });

    if (!res.ok) throw new Error('Wallet login failed');

    showMsg('success', 'Wallet login successful!');
    setTimeout(() => location.href = 'callback.html', 500);

  } catch (err) {
    showMsg('error', err.message);
    setSocialLoading(this, false);
  }
});
  </script>
</body>
</html>
