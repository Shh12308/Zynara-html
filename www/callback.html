<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Logging in...</title>

<style>
  :root {
    --bg-primary: #08080c;
    --bg-secondary: #111116;
    --text-primary: #eeeef2;
    --text-secondary: #9494a6;
    --accent: #10b981;
    --error: #ef4444;
    --radius: 12px;
  }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }

  .box {
    text-align: center;
    width: 90%;
    max-width: 420px;
  }

  .spinner {
    width: 42px;
    height: 42px;
    margin: 0 auto 20px;
    border: 4px solid var(--bg-secondary);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  #status {
    color: var(--text-secondary);
    margin-bottom: 18px;
  }

  #error {
    display: none;
    background: var(--bg-secondary);
    border: 1px solid var(--error);
    padding: 14px;
    border-radius: var(--radius);
    color: #ff6b6b;
  }

  button {
    margin-top: 12px;
    padding: 10px 18px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: white;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="box">
  <div class="spinner" id="spinner"></div>
  <div id="status">Completing login...</div>

  <div id="error">
    <div id="error-msg">Login failed</div>
    <button onclick="location.reload()">Try Again</button>
  </div>
</div>

<script src="env.js"></script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const statusEl = document.getElementById("status");
const errorEl = document.getElementById("error");
const errorMsg = document.getElementById("error-msg");
const spinner = document.getElementById("spinner");

const supabaseUrl = window.__ENV__?.SUPABASE_URL;
const supabaseKey = window.__ENV__?.SUPABASE_ANON_KEY;

function showError(msg, allowReload = true) {
  spinner.style.display = "none";
  statusEl.style.display = "none";
  errorEl.style.display = "block";
  errorMsg.textContent = msg;
  
  // Hide reload button if it's a config error
  if(!allowReload) {
    errorEl.querySelector('button').style.display = 'none';
  }
}

if (!supabaseUrl || !supabaseKey) {
  showError("Missing Supabase environment config.", false);
  throw new Error("Missing env");
}

const supabase = createClient(supabaseUrl, supabaseKey, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true,
    storage: window.localStorage 
  }
});

async function run() {
  try {
    statusEl.textContent = "Checking session...";

    // 1. Attempt to get session (Supabase automatically checks URL if detectSessionInUrl is true)
    const { data, error } = await supabase.auth.getSession();

    if (error) throw error;

    const session = data?.session;
    const user = session?.user;

    // 2. HELPER: Detect if we are stuck with "Stale" tokens in the URL
    const urlParams = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    const hasTokensInUrl = urlParams.has('access_token') || hashParams.has('access_token');

    if (!session) {
      // If there are no tokens in storage BUT there are tokens in the URL, 
      // it means the URL tokens were invalid/expired (stale).
      // We must clean the URL to prevent a reload loop.
      if (hasTokensInUrl) {
        console.warn("Detected stale tokens in URL. Cleaning...");
        const cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
      }
      
      showError("No active session found. Login link may have expired.");
      return;
    }

    // 3. Check Account Status
    statusEl.textContent = "Checking account...";
    
    try {
      const { data: profile } = await supabase
        .from("users")
        .select("is_banned")
        .eq("id", user.id)
        .single();

      if (profile?.is_banned) {
        showError("Account suspended.");
        return;
      }
    } catch (e) {
      console.warn("Ban check skipped:", e);
    }

    statusEl.textContent = "Success! Redirecting...";

    setTimeout(() => {
      window.location.href = "/index.html";
    }, 700);

  } catch (e) {
    console.error(e);
    showError("Login failed. Please try again.");
  }
}

run();
</script>

</body>
</html>
