<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Email Confirmed – HeloxAi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root {
  --bg: #0f1724;
  --accent: #facc15;
  --text: #e5e7eb;
  --muted: #9ca3af;
  font-family: Inter, system-ui, sans-serif;
}

html, body {
  height: 100%;
  margin: 0;
  background: radial-gradient(circle at top, #1f2937, #020617);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
}

.card {
  text-align: center;
  max-width: 360px;
  padding: 30px;
  border-radius: 20px;
  background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
  box-shadow: 0 20px 50px rgba(0,0,0,.6);
}

.loader {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 4px solid rgba(255,255,255,.15);
  border-top-color: var(--accent);
  margin: 0 auto 16px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.success {
  color: #4ade80;
  font-size: 18px;
  font-weight: 600;
}
</style>
</head>

<body>
  <div class="card">
    <div class="loader"></div>
    <p id="status">Confirming your email…</p>
  </div>

<script src="env.js"></script>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  if (!window.__ENV__) {
    throw new Error("env.js not loaded");
  }

  const {
    SUPABASE_URL,
    SUPABASE_ANON_KEY,
    RECAPTCHA_SITE_KEY
  } = window.__ENV__;

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function check() {
  const { data } = await supabase.auth.getSession();

  const status = document.getElementById("status");

  if (data.session) {
    status.textContent = "Email confirmed! Redirecting…";
    status.className = "success";

    setTimeout(() => {
      window.location.href = "/index.html";
    }, 1500);
  } else {
    status.textContent = "Confirmation link expired or invalid.";
  }
}

check();
</script>
</body>
</html>
