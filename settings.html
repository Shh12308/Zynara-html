<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HeloxAi Settings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #6ee7b7;
  --text: #e6eef6;
  --danger: #ff6b6b;
  --radius: 12px;
  font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
}
body { margin:0; background: var(--bg); color: var(--text); padding:20px; }
header { display:flex; justify-content: space-between; align-items:center; margin-bottom:20px; }
header h1 { margin:0; font-size:1.4rem; }
button { cursor:pointer; border:none; border-radius:var(--radius); padding:10px 15px; font-weight:600; }
.primary { background: linear-gradient(90deg, #0ea5a5, #4ade80); color:#062022; }
.card { background: var(--card); padding:20px; border-radius:var(--radius); margin-bottom:20px; }
input, select { width:100%; padding:10px; margin:5px 0 10px 0; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:#071126; color: var(--text); }

.badge {
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:rgba(255,255,255,0.08);
  padding:8px 12px;
  border-radius:999px;
  font-size:0.9em;
  margin-top:10px;
}

.badge img {
  width:18px;
  height:18px;
}

#email-feedback, #password-feedback, #avatar-feedback, #billing-feedback {
  font-size:0.9em;
  margin-top:10px;
}

img#avatar-preview { width:80px; height:80px; border-radius:50%; margin-bottom:10px; }
</style>
</head>
<body>

<header>
  <h1>HeloxAi Settings</h1>
  <div>
    <button class="primary" onclick="window.location.href='index.html'">Home</button>
    <button class="primary" onclick="window.location.href='prem.html'">Premium</button>
    <button id="logout-btn" class="primary">Logout</button>
  </div>
</header>

<!-- ACCOUNT -->
<div class="card">
  <h2>Account Info</h2>
  <p><strong>Email:</strong> <span id="user-email">Loading...</span></p>
  <div id="provider-badge"></div>

  <img id="avatar-preview" src="" alt="Avatar">
  <input type="file" id="avatar" accept="image/*">
  <div id="avatar-feedback" style="color:red;"></div>

  <label>Nickname:</label>
  <input type="text" id="nickname">

  <label>Personality:</label>
  <select id="personality">
    <option value="friendly">Friendly</option>
    <option value="professional">Professional</option>
    <option value="playful">Playful</option>
  </select>

  <button id="update-profile" class="primary">Save Settings</button>
</div>

<!-- EMAIL -->
<div class="card" id="email-card">
  <h2>Update Email</h2>
  <input type="email" id="new-email" placeholder="new@email.com">
  <div id="email-feedback" style="color:red;"></div>
  <button id="update-email" class="primary">Update Email</button>
</div>

<!-- PASSWORD -->
<div class="card" id="password-card">
  <h2>Change Password</h2>
  <input type="password" id="current-password" placeholder="Current password">
  <input type="password" id="new-password" placeholder="New password">
  <div id="password-feedback" style="color:red;"></div>
  <button id="update-password" class="primary">Update Password</button>
</div>

<!-- 🔥 BILLING (NEW) -->
<div class="card">
  <h2>Billing</h2>

  <button id="manage-subscription" class="primary">
    Manage / Cancel Subscription
  </button>

  <button id="request-refund" class="primary" style="background-color: var(--danger); color:#fff; margin-top:10px;">
    Request Refund
  </button>

  <div id="billing-feedback"></div>
</div>

<!-- DANGER -->
<div class="card">
  <h2>Danger Zone</h2>
  <button id="delete-account" class="primary" style="background-color: var(--danger); color:#fff;">
    Delete Account
  </button>
</div>

<script src="env.js"></script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const { SUPABASE_URL, SUPABASE_ANON_KEY, BACKEND_URL } = window.__ENV__;
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const userEmailSpan = document.getElementById("user-email");
const nicknameInput = document.getElementById("nickname");
const personalitySelect = document.getElementById("personality");
const avatarPreview = document.getElementById("avatar-preview");
const providerBadge = document.getElementById("provider-badge");
const billingFeedback = document.getElementById("billing-feedback");

// ------------------ LOAD USER ------------------
async function loadUser() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) { window.location.href="auth.html"; return; }

  userEmailSpan.textContent = user.email;

  const provider = user.app_metadata?.provider || "email";

  const icons = {
    google: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg",
    github: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg",
    discord: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/discordjs/discordjs-original.svg",
    email: "https://cdn-icons-png.flaticon.com/512/561/561127.png"
  };

  providerBadge.innerHTML = `
    <div class="badge">
      <img src="${icons[provider] || icons.email}">
      Connected Account: ${provider}
    </div>
  `;

  if (provider !== "email") {
    document.getElementById("email-card").style.display = "none";
    document.getElementById("password-card").style.display = "none";
  }
}
loadUser();

// ------------------ LOGOUT ------------------
document.getElementById("logout-btn").addEventListener("click", async () => {
  await supabase.auth.signOut();
  window.location.href="auth.html";
});

// ------------------ HELPERS ------------------
async function getUserId() {
  const { data: { user } } = await supabase.auth.getUser();
  return user?.id;
}

// ------------------ MANAGE SUBSCRIPTION ------------------
document.getElementById("manage-subscription").addEventListener("click", async () => {
  billingFeedback.textContent = "Loading...";

  try {
    const user_id = await getUserId();

    const res = await fetch(`${BACKEND_URL}/create-portal-session`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ user_id })
    });

    const data = await res.json();

    if (data.url) {
      window.location.href = data.url;
    } else {
      throw new Error(data.error);
    }

  } catch (err) {
    billingFeedback.textContent = "❌ " + err.message;
  }
});

// ------------------ REFUND ------------------
document.getElementById("request-refund").addEventListener("click", async () => {
  const confirmRefund = confirm("Are you sure you want a refund?");
  if (!confirmRefund) return;

  billingFeedback.textContent = "Processing refund...";

  try {
    const user_id = await getUserId();

    const res = await fetch(`${BACKEND_URL}/refund`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user_id,
        reason: "requested_by_customer"
      })
    });

    const data = await res.json();

    if (data.success) {
      billingFeedback.textContent = "✅ Refund successful";
    } else {
      throw new Error(data.error);
    }

  } catch (err) {
    billingFeedback.textContent = "❌ " + err.message;
  }
});
</script>

</body>
</html>
